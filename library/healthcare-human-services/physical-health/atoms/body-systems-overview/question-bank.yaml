meta:
  atom_id: body-systems-overview
  atom_serial: HHS-PH-0004
  sidecar: question-bank
  status: ai-draft
  item_count: 14
  author: claude
  reviewer:
  review_date:

# Items dropped from an earlier 20-item draft because they tested
# system-internal content (nephron, alveolus, insulin, CNS anatomy,
# cardiac muscle, arteries/veins, positive feedback, gas exchange).
# Those belong in per-system deep-dive atoms.
#
# Every item below traces to one of the LO's three parts:
#   1. Name the 11 organ systems
#   2. State each system's primary function
#   3. Give one common disorder associated with each
# Plus the stub's "no system works alone" cross-system framing.

items:
  - id: q001
    type: multiple_choice
    stem: "Which organ system is primarily responsible for thermoregulation, protection against pathogens at the body's surface, and sensation of touch?"
    options:
      - "Skeletal system"
      - "Muscular system"
      - "Integumentary system"
      - "Endocrine system"
    correct: 2
    rationale: "The integumentary system — skin, hair, and nails — handles barrier, thermoregulation, and sensation."
    objective_tag: match-system-to-function
    difficulty: 1
    tags: [system-identification]
    related_terms: [integumentary system]

  - id: q002
    type: multiple_choice
    stem: "Which system provides slower-acting, body-wide chemical regulation through hormones?"
    options:
      - "Nervous system"
      - "Endocrine system"
      - "Lymphatic system"
      - "Cardiovascular system"
    correct: 1
    rationale: "The endocrine system uses hormones released into the blood to reach tissues everywhere. The nervous system is faster but more localized."
    objective_tag: match-system-to-function
    difficulty: 1
    tags: [system-identification]
    related_terms: [endocrine system]

  - id: q003
    type: true_false
    stem: "Bones are inert, non-living scaffolding that support the body but do not participate in metabolism."
    correct: false
    rationale: "Bones are living tissue. They undergo continuous remodeling, store and release calcium, house blood-cell-producing marrow, and secrete hormones."
    objective_tag: counter-misconception
    difficulty: 1
    tags: [skeletal, misconception]
    related_terms: [skeletal system]
    misconception_addressed: "Misconception 1"
    source_key: NIA-Aging-Bone

  - id: q004
    type: matching
    stem: "Match each organ system (left) to its primary function (right)."
    left:
      - "Skeletal"
      - "Respiratory"
      - "Endocrine"
      - "Lymphatic"
    right:
      - "Gas exchange between air and blood"
      - "Fluid balance and immune defense"
      - "Support, protection, calcium storage, blood-cell production"
      - "Chemical regulation through hormones"
    correct: [[0, 2], [1, 0], [2, 3], [3, 1]]
    rationale: "Each pairing is the canonical primary function for that system. Left and right are presented in different orders so the student must actually match."
    objective_tag: match-system-to-function
    difficulty: 1
    tags: [system-identification]
    related_terms: [skeletal system, respiratory system, endocrine system, lymphatic system]

  - id: q005
    type: matching
    stem: "Match each organ system to one common disorder associated with it."
    left:
      - "Skeletal"
      - "Cardiovascular"
      - "Respiratory"
      - "Endocrine"
    right:
      - "Asthma"
      - "Osteoporosis"
      - "Diabetes mellitus"
      - "Hypertension"
    correct: [[0, 1], [1, 3], [2, 0], [3, 2]]
    rationale: "This item targets the LO's third part: give one common disorder per system. Four systems shown here; the remaining seven are covered in longer matching items."
    objective_tag: match-system-to-disorder
    difficulty: 1
    tags: [disorders]
    related_terms: [skeletal system, cardiovascular system, respiratory system, endocrine system, hypertension, diabetes mellitus]
    source_key: Mayo-Organ-Systems

  - id: q006
    type: multiple_choice
    stem: "A patient with long-standing type 2 diabetes is most likely to also have problems in which combination of systems?"
    options:
      - "Only the endocrine system"
      - "Endocrine and digestive systems"
      - "Endocrine, urinary, nervous, and cardiovascular systems"
      - "Endocrine and reproductive systems only"
    correct: 2
    rationale: "Long-standing diabetes damages small blood vessels and nerves throughout the body, so the kidney, peripheral nerves, and large vessels are all affected in addition to the original endocrine problem."
    objective_tag: reason-about-system-interaction
    difficulty: 3
    tags: [system-interaction, diabetes]
    related_terms: [diabetes mellitus, system interaction]
    misconception_addressed: "Misconception 4"
    source_key: NIDDK-CKD

  - id: q007
    type: multiple_choice
    stem: "Which of the following best describes homeostasis?"
    options:
      - "The body keeps all internal variables perfectly constant"
      - "The body keeps internal variables within a safe range; when they drift, systems respond to bring them back"
      - "The body resists all internal change by avoiding environmental exposure"
      - "The body adapts to whatever internal state the environment produces"
    correct: 1
    rationale: "Homeostasis means regulation within a range; it depends on multiple systems responding when values drift."
    objective_tag: define-key-term
    difficulty: 1
    tags: [homeostasis]
    related_terms: [homeostasis, system interaction]
    source_key: OpenStax §1.5

  - id: q008
    type: true_false
    stem: "The pancreas belongs to exactly one organ system."
    correct: false
    rationale: "The pancreas is both a digestive organ (enzymes into the small intestine) and an endocrine organ (hormones into the blood). Several organs — including the gonads and the skin — do double duty."
    objective_tag: correct-one-system-misconception
    difficulty: 2
    tags: [misconception, system-identification]
    related_terms: [organ system]
    misconception_addressed: "Misconception 3"
    source_key: OpenStax §17.1

  - id: q009
    type: short_answer
    stem: "Name three organ systems that collaborate to regulate blood pressure."
    correct: "Cardiovascular, nervous, endocrine, and urinary systems. Any three of those four is acceptable."
    rationale: "Blood-pressure regulation is the canonical multi-system interaction. This item exercises the stub's 'no system works alone' framing."
    objective_tag: explain-system-interaction
    difficulty: 2
    tags: [system-interaction]
    related_terms: [hypertension, system interaction]
    source_key: NIH-NHLBI-HBP

  - id: q010
    type: multiple_choice
    stem: "A patient's vital signs show heart rate 110, respiratory rate 24, and temperature 38.5 °C. Which pattern of system activity best explains these findings?"
    options:
      - "Isolated cardiovascular dysfunction"
      - "Coordinated response of nervous, cardiovascular, respiratory, and immune systems to infection"
      - "Endocrine failure only"
      - "A reading error — these values are not physiologically possible"
    correct: 1
    rationale: "Fever plus elevated heart and respiratory rates is the coordinated response to infection. Reading the three numbers together tells the system-level story; reading any one alone would miss it."
    objective_tag: interpret-vital-signs
    difficulty: 2
    tags: [system-interaction]
    related_terms: [system interaction]
    misconception_addressed: "Misconception 2"
    source_key: AHA-Vital-Signs

  - id: q011
    type: multiple_choice
    stem: "A stroke is best described as a disorder of:"
    options:
      - "The nervous system only"
      - "The cardiovascular system only"
      - "Both the cardiovascular system (loss of blood flow or bleed) and the nervous system (brain tissue injury)"
      - "The endocrine system"
    correct: 2
    rationale: "A stroke is a cross-system event: a cardiovascular cause produces a nervous-system consequence. This is why stroke appears on two disorder lists."
    objective_tag: reason-about-system-interaction
    difficulty: 2
    tags: [system-interaction]
    related_terms: [stroke, cardiovascular system, nervous system]

  - id: q012
    type: fill_blank
    stem: "The organ system of kidneys, ureters, bladder, and urethra is the ______ system."
    correct: "urinary"
    rationale: "Urinary-system identification by organ membership. Direct LO-part-1 check."
    objective_tag: name-system
    difficulty: 1
    tags: [system-identification]
    related_terms: [urinary system]

  - id: q013
    type: multiple_choice
    stem: "Which organ system returns leaked fluid to the bloodstream and runs the immune defense against pathogens?"
    options:
      - "Cardiovascular system"
      - "Lymphatic system"
      - "Digestive system"
      - "Urinary system"
    correct: 1
    rationale: "The lymphatic system handles both fluid balance and immune defense. Students often confuse it with the cardiovascular system because lymph flows through vessels."
    objective_tag: match-system-to-function
    difficulty: 1
    tags: [system-identification]
    related_terms: [lymphatic system]
    source_key: CDC-Immune-Basics

  - id: q014
    type: short_answer
    stem: "Explain in two or three sentences why nearly every chronic disease is described as a 'system interaction' problem rather than a 'one-system' problem."
    correct: "In chronic disease, a failure in one system (for example, poor glucose regulation in the endocrine system) damages other systems over time (kidneys, nerves, vessels). Each new dysfunction amplifies the others, so treating only the original system is not enough. Healthcare teams therefore include specialists for several systems for the same patient."
    rationale: "This item checks whether the student has internalized the central pedagogical move of the atom — from isolated-system thinking to interaction thinking."
    objective_tag: explain-system-interaction
    difficulty: 3
    tags: [system-interaction, synthesis]
    related_terms: [system interaction]
    misconception_addressed: "Misconception 4"
