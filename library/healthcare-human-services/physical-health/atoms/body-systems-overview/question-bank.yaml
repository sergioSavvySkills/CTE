items:
  - id: q001
    type: multiple_choice
    stem: "Which organ system is primarily responsible for thermoregulation, protection against pathogens at the body's surface, and sensation of touch?"
    options:
      - "Skeletal system"
      - "Muscular system"
      - "Integumentary system"
      - "Endocrine system"
    correct: 2
    rationale: "The integumentary system — skin, hair, and nails — handles barrier, thermoregulation, and sensation. The other listed systems contribute to heat generation (muscular) or chemical regulation (endocrine) but are not primarily responsible for thermoregulation."
    objective_tag: match-system-to-function
    difficulty: 1
    tags: [system-identification, integumentary]
    related_terms: [integumentary system, thermoregulation]

  - id: q002
    type: multiple_choice
    stem: "A patient has a glomerular filtration rate of 40 mL/min. Which organ system is most directly affected, and what is the likely diagnosis?"
    options:
      - "Cardiovascular system — heart failure"
      - "Urinary system — chronic kidney disease"
      - "Endocrine system — diabetes mellitus"
      - "Respiratory system — chronic obstructive pulmonary disease"
    correct: 1
    rationale: "Glomerular filtration rate measures kidney function. A value of 40 mL/min is consistent with stage-3 chronic kidney disease, a urinary-system disorder. Diabetes is a common upstream cause but is not what GFR directly measures."
    objective_tag: diagnose-from-value
    difficulty: 2
    tags: [urinary, lab-values]
    related_terms: [glomerular filtration rate, chronic kidney disease, nephron]
    source_key: NIDDK-CKD

  - id: q003
    type: true_false
    stem: "Bones are inert, non-living scaffolding that support the body but do not participate in metabolism."
    correct: false
    rationale: "Bones are living tissue. They undergo continuous bone remodeling, store and release calcium, house blood-cell-producing marrow, and secrete hormones. This is a foundational misconception to correct."
    objective_tag: counter-misconception
    difficulty: 1
    tags: [skeletal, misconception]
    related_terms: [bone remodeling, skeletal system]
    misconception_addressed: "Misconception 1"
    source_key: NIA-Aging-Bone

  - id: q004
    type: multiple_choice
    stem: "Cardiorespiratory coupling refers to:"
    options:
      - "The physical connection between the heart and lungs"
      - "The coordinated rise in heart rate and breathing rate during exertion or stress"
      - "A surgical procedure that links circulatory and respiratory function"
      - "A diagnostic test for cardiac arrhythmias"
    correct: 1
    rationale: "Cardiorespiratory coupling is the coordinated change in heart rate and breathing rate driven by the nervous system's reading of metabolic demand. It is a functional concept, not an anatomical one."
    objective_tag: define-key-term
    difficulty: 2
    tags: [vocabulary, system-interaction]
    related_terms: [cardiorespiratory coupling, system interaction]
    source_key: OpenStax §19.4

  - id: q005
    type: matching
    stem: "Match each organ system to its primary function."
    options:
      - ["Skeletal", "Support, protection, calcium storage, blood-cell production"]
      - ["Respiratory", "Gas exchange between air and blood"]
      - ["Endocrine", "Chemical regulation through hormones"]
      - ["Lymphatic", "Fluid balance and immune defense"]
    correct: [0, 1, 2, 3]
    rationale: "Each pairing is the canonical primary function for that system. Students should be fluent at this level before tackling cross-system interactions."
    objective_tag: match-system-to-function
    difficulty: 1
    tags: [system-identification]
    related_terms: [skeletal system, respiratory system, endocrine system, lymphatic system]

  - id: q006
    type: multiple_choice
    stem: "A patient with long-standing type 2 diabetes is most likely to also have problems in which combination of systems?"
    options:
      - "Only the endocrine system"
      - "Endocrine and digestive systems"
      - "Endocrine, urinary, nervous, and cardiovascular systems"
      - "Endocrine and reproductive systems only"
    correct: 2
    rationale: "Long-standing diabetes damages small blood vessels and nerves throughout the body, so the kidney (urinary), peripheral nerves (nervous), and large vessels (cardiovascular) are all affected in addition to the original endocrine problem. This is a classic system-interaction case."
    objective_tag: reason-about-system-interaction
    difficulty: 3
    tags: [system-interaction, diabetes]
    related_terms: [diabetes mellitus, system interaction, chronic kidney disease]
    misconception_addressed: "Misconception 5"
    source_key: NIDDK-CKD

  - id: q007
    type: fill_blank
    stem: "The filtering unit of the kidney is called the ______."
    correct: "nephron"
    rationale: "Each kidney contains roughly a million nephrons. Glomerular filtration rate is literally the combined filtering throughput of all of them."
    objective_tag: recall-term
    difficulty: 1
    tags: [vocabulary, urinary]
    related_terms: [nephron, glomerular filtration rate]

  - id: q008
    type: multiple_choice
    stem: "Which of the following best describes homeostasis?"
    options:
      - "The body keeps all internal variables perfectly constant"
      - "The body actively holds internal variables within a safe range around set points"
      - "The body resists all internal changes by avoiding environmental exposure"
      - "The body adapts to whatever internal state the environment produces"
    correct: 1
    rationale: "Homeostasis means regulation around set points, not perfect constancy. Variables drift; feedback loops pull them back. Option A is the classic student misconception."
    objective_tag: correct-homeostasis-model
    difficulty: 2
    tags: [homeostasis, misconception]
    related_terms: [homeostasis, set point, feedback loop]
    misconception_addressed: "Misconception 4"
    source_key: OpenStax §1.5

  - id: q009
    type: multiple_choice
    stem: "Uterine contractions during childbirth use which type of feedback?"
    options:
      - "Negative feedback"
      - "Positive feedback"
      - "No feedback — the process runs on a timer"
      - "Endocrine inhibition only"
    correct: 1
    rationale: "Positive feedback amplifies a change. In labor, contractions trigger oxytocin release, which triggers stronger contractions, which trigger more oxytocin, until birth. Negative feedback (the usual type) would dampen, not amplify."
    objective_tag: distinguish-feedback-types
    difficulty: 2
    tags: [homeostasis]
    related_terms: [positive feedback, negative feedback]
    source_key: OpenStax §1.5

  - id: q010
    type: multiple_choice
    stem: "Blood vessels that carry blood AWAY from the heart are called:"
    options:
      - "Veins"
      - "Capillaries"
      - "Arteries"
      - "Alveoli"
    correct: 2
    rationale: "Arteries carry blood away from the heart. Veins carry it back. Capillaries are the exchange points in between. Alveoli are air sacs in the lungs, not blood vessels."
    objective_tag: recall-term
    difficulty: 1
    tags: [vocabulary, cardiovascular]
    related_terms: [artery, vein, capillary, alveolus]

  - id: q011
    type: true_false
    stem: "The pancreas belongs to exactly one organ system."
    correct: false
    rationale: "The pancreas is both a digestive organ (it releases enzymes into the small intestine) and an endocrine organ (it releases insulin and glucagon into the blood). Several organs — including the gonads and the skin — do double duty."
    objective_tag: correct-one-system-misconception
    difficulty: 2
    tags: [misconception, system-identification]
    related_terms: [organ, organ system]
    misconception_addressed: "Misconception 3"
    source_key: OpenStax §17.1

  - id: q012
    type: multiple_choice
    stem: "Gas exchange in the lungs occurs primarily at which structure?"
    options:
      - "Trachea"
      - "Bronchi"
      - "Alveoli"
      - "Pharynx"
    correct: 2
    rationale: "Alveoli are the tiny air sacs where oxygen diffuses into the blood and carbon dioxide diffuses out. The other structures are conducting airways that move air to and from the alveoli but do not themselves perform gas exchange."
    objective_tag: recall-term
    difficulty: 1
    tags: [vocabulary, respiratory]
    related_terms: [alveolus, gas exchange, respiratory system]

  - id: q013
    type: short_answer
    stem: "Name three organ systems that collaborate to regulate blood pressure and briefly describe the role of each."
    correct: "Cardiovascular (adjusts heart rate and vessel diameter), nervous (senses pressure via baroreceptors and signals responses), endocrine (releases hormones that adjust fluid retention), and urinary (adjusts fluid and electrolyte output). Any three of these four with a correct role description is acceptable."
    rationale: "Blood-pressure regulation is the canonical multi-system interaction. Clinicians treating hypertension target each of these four levers in turn."
    objective_tag: explain-system-interaction
    difficulty: 3
    tags: [system-interaction, cardiovascular]
    related_terms: [hypertension, baroreceptor, system interaction]
    source_key: Guyton-Renal-BP

  - id: q014
    type: multiple_choice
    stem: "A patient's vital signs show heart rate 110, respiratory rate 24, and temperature 38.5 °C. Which pattern of system activity best explains these findings?"
    options:
      - "Isolated cardiovascular dysfunction"
      - "Coordinated response of nervous, cardiovascular, respiratory, and immune systems to infection"
      - "Endocrine failure only"
      - "A reading error — these values are not physiologically possible"
    correct: 1
    rationale: "Fever plus elevated heart and respiratory rates is the classic coordinated response to infection: the immune system is active, the nervous system has raised the thermostat, and cardiorespiratory coupling drives heart and breathing rates up together."
    objective_tag: interpret-vital-signs
    difficulty: 3
    tags: [vital-signs, system-interaction]
    related_terms: [vital signs, immune response, cardiorespiratory coupling]
    misconception_addressed: "Misconception 2"
    source_key: AHA-Vital-Signs

  - id: q015
    type: multiple_choice
    stem: "Which type of muscle is found only in the heart?"
    options:
      - "Skeletal muscle"
      - "Smooth muscle"
      - "Cardiac muscle"
      - "Voluntary muscle"
    correct: 2
    rationale: "Cardiac muscle is unique to the heart. Skeletal muscle moves bones and is voluntary. Smooth muscle lines organs and vessels and is involuntary. Cardiac muscle is involuntary and striated."
    objective_tag: recall-term
    difficulty: 1
    tags: [vocabulary, muscular]
    related_terms: [cardiac muscle, skeletal muscle, smooth muscle]

  - id: q016
    type: multiple_choice
    stem: "The central nervous system consists of:"
    options:
      - "The brain only"
      - "The brain and the spinal cord"
      - "The nerves that reach the arms and legs"
      - "The brain, spinal cord, and all peripheral nerves"
    correct: 1
    rationale: "Central nervous system = brain + spinal cord. The peripheral nervous system is the nerves that connect the CNS to the rest of the body. Students often collapse the two."
    objective_tag: recall-term
    difficulty: 1
    tags: [vocabulary, nervous]
    related_terms: [central nervous system, peripheral nervous system, neuron]

  - id: q017
    type: ordering
    stem: "Place these levels of biological organization in order from smallest to largest."
    options:
      - "Organ"
      - "Cell"
      - "Organ system"
      - "Tissue"
    correct: [1, 3, 0, 2]
    rationale: "Cell (1) → Tissue (3) → Organ (0) → Organ system (2). This hierarchy is the skeleton of anatomy vocabulary; every other term hangs on it."
    objective_tag: order-levels-of-organization
    difficulty: 1
    tags: [organization, vocabulary]
    related_terms: [tissue, organ, organ system]
    source_key: OpenStax §1.2

  - id: q018
    type: multiple_choice
    stem: "Insulin is a hormone released by the pancreas. What is its primary effect?"
    options:
      - "Raises blood glucose by triggering glucose release from the liver"
      - "Lowers blood glucose by signaling cells to take up glucose from the blood"
      - "Raises blood pressure by constricting arteries"
      - "Has no measurable effect on blood glucose in healthy adults"
    correct: 1
    rationale: "Insulin lowers blood glucose by signaling muscle, liver, and fat cells to take up glucose. Glucagon, not insulin, raises glucose. Failure of insulin regulation causes diabetes."
    objective_tag: recall-hormone-function
    difficulty: 2
    tags: [endocrine, diabetes]
    related_terms: [insulin, hormone, diabetes mellitus]
    source_key: OpenStax §17.1

  - id: q019
    type: multiple_choice
    stem: "A stroke can be described as affecting:"
    options:
      - "The nervous system only"
      - "The cardiovascular system only"
      - "Both the cardiovascular system (loss of blood flow or bleed) and the nervous system (brain tissue injury)"
      - "The endocrine system"
    correct: 2
    rationale: "A stroke is a cross-system event: a cardiovascular cause (clot or bleed) produces a nervous-system consequence (damaged brain tissue). This is why stroke appears on both disorder lists."
    objective_tag: reason-about-system-interaction
    difficulty: 2
    tags: [system-interaction, neuro, cardiovascular]
    related_terms: [stroke, cardiovascular system, nervous system]

  - id: q020
    type: short_answer
    stem: "Explain in two or three sentences why nearly every chronic disease is described as a 'system interaction' problem rather than a 'one-system' problem."
    correct: "In chronic disease, a failure in one system (for example, poor glucose regulation in the endocrine system) damages the structures and signaling of other systems over time (kidneys, nerves, blood vessels). Once multiple systems are affected, each dysfunction amplifies the others, so treating only the original system is not enough. Healthcare teams therefore include specialists for several systems for the same patient."
    rationale: "This short-answer item checks whether the student has internalized the central pedagogical move of the atom — from isolated-system thinking to interaction thinking. The specific wording can vary; look for naming multiple systems and acknowledging amplification."
    objective_tag: explain-system-interaction
    difficulty: 3
    tags: [system-interaction, synthesis]
    related_terms: [system interaction, disorder]
    misconception_addressed: "Misconception 5"
