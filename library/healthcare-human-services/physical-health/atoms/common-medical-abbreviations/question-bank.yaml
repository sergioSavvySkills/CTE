  atom_id: common-medical-abbreviations
  atom_serial: HHS-PH-0005
  sidecar: question-bank
  status: ai-draft
  item_count: 13
  author: claude
  reviewer:
  review_date:

# Every item traces to one of the LO's two parts:
#   1. Read and use common medical abbreviations correctly
#   2. Avoid the "do-not-use" list that contributes to medication errors
# Items dropped from an earlier draft because they strayed into
# pharmacology (drug mechanisms), specific lab-value interpretation,
# word-part decoding (that's the prereq), or legal/malpractice content.
# Every misconception in misconceptions.md is addressed by at least one
# item below (see misconception_addressed fields).

items:
  - id: q001
    type: multiple_choice
    stem: "A medication order reads *Lisinopril 10 mg PO daily*. What does *PO* mean?"
    options:
      - "By mouth"
      - "Intravenously"
      - "Intramuscularly"
      - "As needed"
    correct: 0
    rationale: "*PO* is from Latin *per os* — by mouth. It is one of the most common route abbreviations on medication orders."
    objective_tag: decode-route
    difficulty: 1
    tags: [route, vocabulary]
    related_terms: [PO, abbreviation]

  - id: q002
    type: multiple_choice
    stem: "Which abbreviation on a medication order means the dose should be given **immediately**?"
    options:
      - "prn"
      - "stat"
      - "qid"
      - "hs"
    correct: 1
    rationale: "*stat* is from Latin *statim* and means *immediately*. *prn* means *as needed*, *qid* is four times a day, and *hs* is at bedtime."
    objective_tag: decode-frequency
    difficulty: 1
    tags: [frequency, vocabulary]
    related_terms: [stat, prn]

  - id: q003
    type: matching
    stem: "Match each status/order abbreviation (left) to its meaning (right)."
    left:
      - "NPO"
      - "NKDA"
      - "DNR"
      - "prn"
    right:
      - "Do not attempt resuscitation"
      - "Nothing by mouth"
      - "As needed"
      - "No known drug allergies"
    correct: [[0, 1], [1, 3], [2, 0], [3, 2]]
    rationale: "These four are the highest-frequency status codes in U.S. charts. Right-column order is scrambled so the student must match, not guess by position."
    objective_tag: decode-status
    difficulty: 1
    tags: [status, vocabulary]
    related_terms: [NPO, NKDA, DNR, prn]

  - id: q004
    type: true_false
    stem: "Writing *1.0 mg* is safer than writing *1 mg* because the trailing zero signals that the dose is precise."
    correct: false
    rationale: "A trailing zero is banned on dose expressions. The decimal point can be missed, turning *1.0 mg* into *10 mg* — a ten-fold overdose. Write *1 mg*."
    objective_tag: apply-decimal-discipline
    difficulty: 2
    tags: [do-not-use, decimal-discipline, misconception]
    related_terms: [decimal discipline, do-not-use list]
    misconception_addressed: "Misconception 2"
    source_key: TJC-DoNotUse

  - id: q005
    type: fill_blank
    stem: "Rewrite this dose in safe form: *.25 mg*. The correct form is ______ mg."
    correct: "0.25"
    rationale: "Always write a leading zero before a decimal dose. Without it, *.25* can be misread as *25*. This is the leading-zero half of decimal discipline."
    objective_tag: apply-decimal-discipline
    difficulty: 2
    tags: [do-not-use, decimal-discipline]
    related_terms: [decimal discipline]
    source_key: FDA-SafeDose

  - id: q006
    type: multiple_choice
    stem: "A handwritten order reads *Insulin regular 6U subQ ac*. Which part of this order is on the Joint Commission do-not-use list and must be rewritten?"
    options:
      - "*Insulin regular* — drug names cannot be abbreviated"
      - "*6U* — the letter U must be replaced with *unit* or *units*"
      - "*subQ* — all route abbreviations are banned"
      - "*ac* — frequency abbreviations are banned"
    correct: 1
    rationale: "*U* is the first entry on the official do-not-use list because it has been misread as a zero, producing ten-fold insulin overdoses. Write *6 units*."
    objective_tag: identify-do-not-use
    difficulty: 2
    tags: [do-not-use]
    related_terms: [do-not-use list, medication error]
    source_key: TJC-DoNotUse

  - id: q007
    type: multiple_choice
    stem: "An order reads *MSO4 2 mg IV q4h prn pain*. What is wrong with this order?"
    options:
      - "Nothing — this is standard shorthand"
      - "*MSO4* is banned because it is ambiguous between morphine sulfate and magnesium sulfate; write the drug name in full"
      - "*IV* is banned; write *intravenous* in full"
      - "*q4h* is banned; write *every four hours*"
    correct: 1
    rationale: "*MS*, *MSO4*, and *MgSO4* are all on the do-not-use list. Morphine and magnesium are very different drugs and the abbreviations have been swapped with harm. Write *morphine sulfate* in full."
    objective_tag: identify-do-not-use
    difficulty: 2
    tags: [do-not-use, high-alert]
    related_terms: [do-not-use list, medication error]
    source_key: ISMP-HighAlert

  - id: q008
    type: short_answer
    stem: "A colleague says: *'If the abbreviation was written on a chart I saw yesterday, I can use it in my own note today.'* In one or two sentences, explain why that reasoning is unsafe."
    correct: "Legacy charts and older documents often still contain banned forms; seeing an abbreviation in a prior note is not evidence that it is currently acceptable. Current rules come from the Joint Commission do-not-use list and the facility's approved abbreviation list, not from imitation of older charts."
    rationale: "Checks that the student rejects imitation-as-permission and names the two current sources of authority (TJC list plus facility list)."
    objective_tag: reason-about-documentation-rules
    difficulty: 2
    tags: [misconception, do-not-use]
    related_terms: [do-not-use list, approved abbreviation list, Joint Commission]
    misconception_addressed: "Misconception 1"
    source_key: TJC-DoNotUse

  - id: q009
    type: true_false
    stem: "Once you have memorized the nine or so items on the Joint Commission do-not-use list, you have everything you need to document safely."
    correct: false
    rationale: "The Joint Commission list is a minimum. ISMP maintains a broader error-prone abbreviations list, and each facility's approved abbreviation list extends the rules further. The habit is to recognize dangerous *shapes* and spell them out in full, not to recite one memorized list."
    objective_tag: apply-documentation-habit
    difficulty: 2
    tags: [misconception, do-not-use]
    related_terms: [ISMP, do-not-use list, approved abbreviation list]
    misconception_addressed: "Misconception 3"
    source_key: ISMP-ErrorProne

  - id: q010
    type: multiple_choice
    stem: "You are starting a new job at a different hospital. What should you do before charting a note that uses shorthand you commonly used at your previous employer?"
    options:
      - "Use the same shorthand — all accredited hospitals follow identical lists"
      - "Ask the patient which abbreviations they prefer"
      - "Locate and read the new facility's approved abbreviation list"
      - "Avoid abbreviations entirely until your next performance review"
    correct: 2
    rationale: "Each facility maintains its own approved abbreviation list, and the lists differ. Your first documentation task at a new site is to find that list and chart to it."
    objective_tag: apply-documentation-habit
    difficulty: 2
    tags: [facility-variation, misconception]
    related_terms: [approved abbreviation list, Joint Commission]
    misconception_addressed: "Misconception 4"
    source_key: TJC-NPSG

  - id: q011
    type: ordering
    stem: "Arrange the three-step habit this atom teaches, in the order you should apply it when reading a new order."
    options:
      - "Look up any unfamiliar abbreviation on the facility's approved list"
      - "Recognize and name the category (dose, route, frequency, status) of each abbreviation"
      - "Avoid and rewrite any banned forms before carrying out the order"
    correct: [1, 0, 2]
    rationale: "The sequence is *recognize → look up → avoid*. You must name the category before you can spot a gap; you must resolve the gap before you can rewrite a banned form. Option indices map to recognize (1), look up (0), avoid (2)."
    objective_tag: apply-documentation-habit
    difficulty: 2
    tags: [habit, synthesis]
    related_terms: [abbreviation, do-not-use list, approved abbreviation list]

  - id: q012
    type: multiple_choice
    stem: "Which two abbreviations are on the Joint Commission do-not-use list because they are easily confused with each other?"
    options:
      - "bid and tid"
      - "QD and QOD"
      - "PO and IV"
      - "NPO and NKDA"
    correct: 1
    rationale: "*QD* (once daily) and *QOD* (every other day) look nearly identical in hurried handwriting and have been swapped with patient harm. Both are banned; write *daily* and *every other day* in full."
    objective_tag: identify-do-not-use
    difficulty: 1
    tags: [do-not-use]
    related_terms: [do-not-use list]
    source_key: TJC-DoNotUse

  - id: q013
    type: short_answer
    stem: "Rewrite the following order so that nothing on it appears on the do-not-use list: *MgSO4 1.0 g IM QOD*."
    correct: "Magnesium sulfate 1 g IM every other day."
    rationale: "Three fixes are required: spell out *magnesium sulfate* (MgSO4 and MS are banned), drop the trailing zero (write *1 g*), and expand *QOD* to *every other day*."
    objective_tag: rewrite-safe-form
    difficulty: 3
    tags: [do-not-use, rewrite, synthesis]
    related_terms: [do-not-use list, decimal discipline, medication error]
    source_key: TJC-DoNotUse
