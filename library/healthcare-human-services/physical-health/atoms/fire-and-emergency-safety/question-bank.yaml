items:
  - id: q001
    type: multiple_choice
    stem: "What does the R in RACE stand for, and what action does it name first?"
    options:
      - "Report — call the operator before moving anyone"
      - "Rescue — move anyone in immediate danger out of the fire room"
      - "Return — go back to the nursing station for instructions"
      - "Record — document the fire in the chart"
    correct: 1
    rationale: "The R in RACE is Rescue — the very first action is to move any person in immediate danger (typically the patient in the fire room) to safety."
    objective_tag: apply-RACE
    difficulty: 1
    tags: [RACE, protocol]
    related_terms: [RACE]
    source_key: TJC-EM

  - id: q002
    type: ordering
    stem: "Order the four RACE steps from first to last."
    options:
      - "Rescue anyone in immediate danger"
      - "Alarm — pull station and call the code"
      - "Contain — close doors and shut oxygen as needed"
      - "Extinguish or Evacuate"
    correct: [0, 1, 2, 3]
    rationale: "RACE is a fixed sequence: Rescue, Alarm, Contain, then Extinguish or Evacuate. Each step protects the next."
    objective_tag: apply-RACE
    difficulty: 2
    tags: [RACE, sequence]
    related_terms: [RACE, pull station]
    misconception_addressed: "Misconception 1"
    source_key: TJC-EM

  - id: q003
    type: ordering
    stem: "Order the four PASS steps for operating a portable fire extinguisher."
    options:
      - "Pull the pin"
      - "Aim at the base of the fire"
      - "Squeeze the handle"
      - "Sweep side-to-side"
    correct: [0, 1, 2, 3]
    rationale: "PASS is Pull, Aim (at the base, not the flames), Squeeze, Sweep. Aiming at the base cools the fuel; aiming at the flames does little."
    objective_tag: apply-PASS
    difficulty: 1
    tags: [PASS, extinguisher]
    related_terms: [PASS]
    source_key: OSHA-EAP

  - id: q004
    type: multiple_choice
    stem: "When using a fire extinguisher, where should the nozzle be aimed?"
    options:
      - "At the top of the flames"
      - "At the smoke above the fire"
      - "At the base of the fire"
      - "At the ceiling above the fire"
    correct: 2
    rationale: "Aim at the base of the fire to cool the fuel and cut off combustion. Aiming at the flames themselves wastes the short (10-20 second) discharge."
    objective_tag: apply-PASS
    difficulty: 1
    tags: [PASS, extinguisher]
    related_terms: [PASS]
    source_key: OSHA-EAP

  - id: q005
    type: multiple_choice
    stem: "Which situation is the strongest signal that a worker should Evacuate rather than Extinguish?"
    options:
      - "A small fire in a single trash can with a clear path to the door"
      - "A waist-high hallway fire between the worker and the nearest exit, with thickening smoke"
      - "A contained fire in an ashtray with an extinguisher in reach"
      - "A small flame on a blanket the worker can smother"
    correct: 1
    rationale: "A fire larger than a trash can, in your escape path, with growing smoke, is too big for a portable extinguisher's 10-20 second discharge. Evacuate and close the door."
    objective_tag: apply-RACE
    difficulty: 2
    tags: [decision, extinguisher]
    related_terms: [PASS, RACE]
    source_key: OSHA-EAP

  - id: q006
    type: matching
    stem: "Match each emergency code (left) to its most common meaning in U.S. hospitals (right)."
    left:
      - "Code Red"
      - "Code Blue"
      - "Code Pink"
      - "Code Silver"
    right:
      - "Cardiac or respiratory arrest"
      - "Active shooter or weapon threat"
      - "Fire or smoke"
      - "Infant abduction"
    correct: [[0, 2], [1, 0], [2, 3], [3, 1]]
    rationale: "These four are among the most commonly announced codes. Note they are common, not universal — codes vary by facility."
    objective_tag: identify-codes
    difficulty: 2
    tags: [codes, vocabulary]
    related_terms: [emergency code, Code Red, Code Blue]
    source_key: TJC-EM

  - id: q007
    type: true_false
    stem: "The five color-word emergency codes (Red, Blue, Gray, Pink, Silver) mean the same thing in every U.S. hospital."
    correct: false
    rationale: "Codes are commonly taught but NOT universal. Different facilities use different colors or plain language. A new employee should learn the local code list on day one."
    objective_tag: identify-codes
    difficulty: 1
    tags: [codes, safety-culture]
    related_terms: [emergency code]
    misconception_addressed: "Misconception 3"
    source_key: TJC-EM

  - id: q008
    type: multiple_choice
    stem: "A Code Red is announced for a kitchen fire on the first floor. You are on the fourth floor with twelve bedbound patients. What is the appropriate initial action?"
    options:
      - "Start evacuating all patients down the nearest stairwell immediately"
      - "Call each patient's family to inform them of the fire"
      - "Close unit doors, verify your unit is contained, and wait for instructions — defend-in-place applies"
      - "Use the elevators to move bedbound patients to the ground floor"
    correct: 2
    rationale: "Healthcare buildings use defend-in-place. Patients are moved only as far as the next safe smoke compartment; a distant fire rarely requires moving anyone at all. Elevators are never used during a fire."
    objective_tag: apply-RACE
    difficulty: 2
    tags: [evacuation, defend-in-place]
    related_terms: [defend-in-place, smoke compartment, horizontal evacuation, vertical evacuation]
    misconception_addressed: "Misconception 2"
    source_key: NFPA-101

  - id: q009
    type: multiple_choice
    stem: "In an evacuation, which patient group is moved first?"
    options:
      - "Bedbound patients, because they need the most help"
      - "Wheelchair patients, because they are the middle group"
      - "Ambulatory patients, because they move themselves and free up staff"
      - "Patients with visitors, because the visitors can help"
    correct: 2
    rationale: "Order is ambulatory, then wheelchair, then bedbound. Moving the patients who can walk first frees staff to assist those who cannot."
    objective_tag: apply-RACE
    difficulty: 1
    tags: [evacuation, priority]
    related_terms: [horizontal evacuation, vertical evacuation]
    source_key: NFPA-101

  - id: q010
    type: true_false
    stem: "Horizontal evacuation — moving patients sideways through a smoke-compartment door — is attempted before vertical evacuation down stairs."
    correct: true
    rationale: "Horizontal evacuation into the next smoke compartment is the first-choice move because stairwells are slow and hard for non-ambulatory patients. Vertical evacuation is a last resort."
    objective_tag: apply-RACE
    difficulty: 1
    tags: [evacuation, geometry]
    related_terms: [horizontal evacuation, vertical evacuation, smoke compartment]
    source_key: NFPA-101

  - id: q011
    type: multiple_choice
    stem: "A patient on nasal-cannula oxygen has a small trash-can fire in their room. Beyond running RACE, what specific oxygen-related action should staff take?"
    options:
      - "Increase oxygen flow to help the patient breathe through the smoke"
      - "Shut the zone oxygen shutoff valve for the area"
      - "Leave the oxygen running — medical oxygen does not burn"
      - "Disconnect the tubing and leave it on the floor"
    correct: 1
    rationale: "Medical oxygen does not burn, but it accelerates combustion. Shutting the zone oxygen shutoff valve starves the fire of accelerant and is part of the Contain step."
    objective_tag: apply-RACE
    difficulty: 2
    tags: [oxygen, hazard]
    related_terms: [oxygen shutoff valve, RACE]
    source_key: NFPA-HealthcareFire

  - id: q012
    type: multiple_choice
    stem: "You find a fire extinguisher in the hallway with its inspection tag missing and the pin stuck. There has been no fire. What should you do?"
    options:
      - "Nothing — paperwork is only for actual fires"
      - "Leave it alone and mention it at next month's staff meeting"
      - "Take it out of service, notify maintenance, and file a near-miss incident report"
      - "Try to pull the pin yourself to loosen it"
    correct: 2
    rationale: "Near-misses are exactly the events that incident reports are designed to capture. Take the unit out of service so no one grabs it in an emergency, then report so the facility can fix the pattern."
    objective_tag: apply-RACE
    difficulty: 2
    tags: [reporting, near-miss]
    related_terms: [incident report]
    misconception_addressed: "Misconception 4"
    source_key: CMS-EmergencyPrep

  - id: q013
    type: short_answer
    stem: "In two or three sentences, explain why RACE's letters must be executed in order rather than treated as a menu of options."
    correct: "RACE is Rescue, Alarm, Contain, Extinguish or Evacuate, in that order. Rescuing first protects the person in immediate danger; alarming second gets help moving; containing third keeps the fire from growing behind you; extinguishing or evacuating comes last because a portable extinguisher is only useful once the earlier steps are done. Skipping or reordering steps allows a small fire to become a large one."
    rationale: "A correct answer names the sequence and gives the 'why' behind the order — each step protects the next. A student who only lists the letters without the rationale has not grasped why the sequence is fixed."
    objective_tag: apply-RACE
    difficulty: 3
    tags: [RACE, synthesis]
    related_terms: [RACE, pull station]
    misconception_addressed: "Misconception 1"
    source_key: TJC-EM
