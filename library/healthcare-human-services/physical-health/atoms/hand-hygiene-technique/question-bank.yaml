items:
  - id: q001
    type: multiple_choice
    stem: "What is the minimum time you should spend rubbing hands with alcohol-based hand rub (ABHR) for the technique to work?"
    options:
      - "5 seconds, or until the hands feel cool"
      - "About 20 seconds, until the product is fully dry"
      - "60 seconds, then wipe the residue with a paper towel"
      - "Until a second worker tells you that's enough"
    correct: 1
    rationale: "ABHR needs roughly 20 seconds of rubbing and must be allowed to fully dry so the alcohol can finish disinfecting. Wiping the product off early short-cuts the disinfection."
    objective_tag: apply-technique
    difficulty: 1
    tags: [technique, timing]
    related_terms: [alcohol-based hand rub, ABHR]
    source_key: CDC-HandHygiene

  - id: q002
    type: multiple_choice
    stem: "Which situation requires a soap-and-water handwash rather than alcohol-based hand rub?"
    options:
      - "Before touching a patient who is on standard precautions only"
      - "Between two cooperative patients in a shared room"
      - "After caring for a patient with Clostridioides difficile infection"
      - "Before taking vital signs on an alert adult"
    correct: 2
    rationale: "C. difficile produces spores that alcohol does not kill. Only the mechanical friction of a soap-and-water handwash physically removes the spores from the skin."
    objective_tag: select-technique
    difficulty: 1
    tags: [technique-selection, spores]
    related_terms: [soap-and-water handwash, spore]
    misconception_addressed: "Misconception 2"
    source_key: CDC-CDiff

  - id: q003
    type: true_false
    stem: "Wearing gloves during patient contact removes the need to perform hand hygiene after glove removal."
    correct: false
    rationale: "Gloves leak, tear, and contaminate the skin on removal as the outside of the glove brushes the hand. Every indicated Moment that applies before gloves go on applies again after they come off."
    objective_tag: apply-technique
    difficulty: 1
    tags: [gloves, moments]
    related_terms: [hand hygiene]
    misconception_addressed: "Misconception 1"
    source_key: WHO-HandHygiene

  - id: q004
    type: multiple_choice
    stem: "You just entered a patient's room and rubbed ABHR at the door. You walked to the bedside, leaned on the bedrail, and are about to open a sterile dressing kit. What is the correct next action?"
    options:
      - "Open the kit — you cleaned your hands less than a minute ago"
      - "Rub ABHR again at the bedside before opening the kit"
      - "Use soap and water because aseptic tasks always require a full wash"
      - "Ask a second worker to open the kit for you"
    correct: 1
    rationale: "This is Moment 2 — before an aseptic task. Touching the bedrail re-contaminated your hands even if Moment 1 was just performed. ABHR is appropriate because hands are not visibly soiled."
    objective_tag: identify-moments
    difficulty: 2
    tags: [moments, aseptic]
    related_terms: [Five Moments, aseptic task, ABHR]
    source_key: WHO-FiveMoments

  - id: q005
    type: multiple_choice
    stem: "Which is the best description of the WHO 'patient zone'?"
    options:
      - "The hospital floor the patient is admitted to"
      - "The patient and the immediate surfaces around them that become contaminated with the patient's flora"
      - "Any room labeled with an isolation sign"
      - "The zone between the patient's bed and the nurses' station"
    correct: 1
    rationale: "The patient zone is the patient plus the immediate surfaces (bedrail, table, IV pole, call button) that carry the patient's flora. Touching anything in the zone can trigger Moment 5 even if you never touched the patient."
    objective_tag: identify-moments
    difficulty: 2
    tags: [moments, vocabulary]
    related_terms: [patient zone, Five Moments]
    misconception_addressed: "Misconception 3"
    source_key: WHO-FiveMoments

  - id: q006
    type: ordering
    stem: "Order the steps of a correct soap-and-water handwash from first to last."
    options:
      - "Wet hands under running water"
      - "Apply soap and lather, scrubbing all surfaces for at least 20 seconds"
      - "Rinse with fingertips pointed down"
      - "Dry hands with a single-use paper towel, then use the towel to turn off the tap"
    correct: [0, 1, 2, 3]
    rationale: "Wet first so soap lathers; scrub for the full 20 seconds on all surfaces; rinse with fingertips down so water runs away from clean areas; dry with a paper towel and use it to close the tap to avoid recontaminating clean hands."
    objective_tag: apply-technique
    difficulty: 2
    tags: [technique, sequence]
    related_terms: [soap-and-water handwash]
    source_key: WHO-HandHygiene

  - id: q007
    type: multiple_choice
    stem: "You are sharing a semi-private room with Patients A and B, both on standard precautions. You just finished taking A's vitals and are about to cross to B. What is the minimum correct hand-hygiene action?"
    options:
      - "None — you never left the room"
      - "ABHR at A's bedside before leaving A's patient zone, then ABHR at B's bedside before touching B"
      - "One ABHR rub at the door between beds"
      - "Soap-and-water handwash at the sink between beds"
    correct: 1
    rationale: "Moving between patient zones requires Moment 4 for A (after patient contact) and Moment 1 for B (before patient contact) — two separate events, both with ABHR. A single rub at a door would miss both moments and move A's flora to B."
    objective_tag: identify-moments
    difficulty: 2
    tags: [moments, shared-room]
    related_terms: [Five Moments, patient zone]
    misconception_addressed: "Misconception 3"
    source_key: WHO-FiveMoments

  - id: q008
    type: true_false
    stem: "Alcohol-based hand rub is effective against C. difficile spores."
    correct: false
    rationale: "Alcohol does not kill spores. Soap-and-water handwashing is required after caring for a patient with C. difficile so the mechanical friction can physically remove the spores."
    objective_tag: select-technique
    difficulty: 1
    tags: [spores, technique-selection]
    related_terms: [ABHR, spore, soap-and-water handwash]
    misconception_addressed: "Misconception 2"
    source_key: CDC-CDiff

  - id: q009
    type: matching
    stem: "Match each WHO Moment to the situation that triggers it."
    left:
      - "Moment 1 — Before patient contact"
      - "Moment 2 — Before aseptic task"
      - "Moment 3 — After body-fluid exposure risk"
      - "Moment 5 — After contact with patient surroundings"
    right:
      - "Immediately after emptying a urinary drainage bag, before touching anything else"
      - "Just before inserting a peripheral IV"
      - "Straightening the bedside table and adjusting the IV pole but never touching the patient"
      - "Approaching the bedside to greet and examine the patient"
    correct: [[0, 3], [1, 1], [2, 0], [3, 2]]
    rationale: "Moment 1 is about the transition into direct patient contact; Moment 2 is before any aseptic procedure; Moment 3 follows any body-fluid exposure risk at the bedside; Moment 5 applies to surroundings in the patient zone even without patient contact."
    objective_tag: identify-moments
    difficulty: 2
    tags: [moments, matching]
    related_terms: [Five Moments, aseptic task, body-fluid exposure, patient zone]
    source_key: WHO-FiveMoments

  - id: q010
    type: fill_blank
    stem: "The framework of five indications for hand hygiene during patient care — before patient contact, before aseptic task, after body-fluid exposure risk, after patient contact, and after contact with patient surroundings — is called the ______."
    correct: "Five Moments"
    rationale: "The WHO 'Five Moments for Hand Hygiene' organizes indications around the patient zone and aseptic tasks, independent of room layout."
    objective_tag: identify-moments
    difficulty: 1
    tags: [vocabulary]
    related_terms: [Five Moments]
    source_key: WHO-FiveMoments

  - id: q011
    type: multiple_choice
    stem: "A student demonstrating ABHR finishes in about 8 seconds and says 'my hands feel dry already, I'm done.' What feedback is correct?"
    options:
      - "Accept the demonstration — dryness is the correct endpoint"
      - "Reject it — 8 seconds is well below the 20-second minimum, and workers routinely underestimate time; re-demonstrate until timed at 20 seconds"
      - "Accept if the student used the correct volume"
      - "Accept for ABHR but not for soap-and-water"
    correct: 1
    rationale: "Twenty seconds is a specific minimum for both techniques, and observation data show workers consistently underestimate their actual rub time. Training programs use timing cues because 8 seconds does not disinfect reliably."
    objective_tag: apply-technique
    difficulty: 2
    tags: [timing, coaching]
    related_terms: [ABHR]
    misconception_addressed: "Misconception 4"
    source_key: CDC-HandHygiene

  - id: q012
    type: short_answer
    stem: "You wore gloves to change a dressing with drainage. The gloves did not tear. Explain in 2–3 sentences why you still perform hand hygiene immediately after glove removal."
    correct: "Gloves leak at the microscopic level and the outside of the glove — which is contaminated — brushes the skin during removal, transferring organisms to the bare hand. Moment 3 (after body-fluid exposure risk) applies after glove removal regardless of whether the gloves appeared intact. Skipping hand hygiene at this point turns the worker into a carrier of the organism the gloves were meant to contain."
    rationale: "A strong answer names three things: gloves leak, removal re-contaminates, and the Moment applies regardless. Students who only name 'gloves leak' have the partial model."
    objective_tag: apply-technique
    difficulty: 3
    tags: [gloves, synthesis]
    related_terms: [hand hygiene, body-fluid exposure]
    misconception_addressed: "Misconception 1"
    source_key: WHO-HandHygiene

  - id: q013
    type: short_answer
    stem: "Explain in two sentences the difference between what soap-and-water and ABHR actually do, and why that difference means ABHR is the wrong choice after caring for a C. diff patient."
    correct: "Soap-and-water mechanically removes material — including soil and spores — from the skin by friction under running water. ABHR disinfects by disrupting bacterial and viral membranes with alcohol, but alcohol does not kill C. difficile spores, so a spore left on the skin after an ABHR rub simply travels to the next patient."
    rationale: "Strong answers distinguish removal from disinfection and explicitly tie the mechanism to the C. diff exception. The core misconception to surface is the belief that ABHR 'kills everything.'"
    objective_tag: select-technique
    difficulty: 3
    tags: [mechanism, synthesis]
    related_terms: [soap-and-water handwash, ABHR, spore]
    misconception_addressed: "Misconception 2"
    source_key: CDC-CDiff
