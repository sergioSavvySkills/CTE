  review_date:

# Items dropped from an earlier draft because they tested content that
# belongs elsewhere: neural-net architecture (CS atoms), CRISPR
# mechanism and SNP biology (biotech atoms), state-specific advance-
# directive filing rules (legal atom), and deontology-vs-consequentialism
# depth (prerequisite professional-ethics-in-healthcare atom).
#
# Every item below traces to one of the two LO parts:
#   1. Discuss ethical issues raised by emerging healthcare technology
#      (AI, genomics, telehealth, wearables, end-of-life)
#   2. Apply the four ethical principles to evaluate them
# Plus explicit coverage for each of the four misconceptions.

items:
  - id: q001
    type: multiple_choice
    stem: "A diagnostic AI was trained on chest X-rays from one hospital and performs less accurately on patients from a hospital whose population differs from the training set. This pattern is best described as:"
    options:
      - "Algorithmic bias"
      - "A privacy breach"
      - "A licensure problem"
      - "An advance-directive issue"
    correct: 0
    rationale: "When a model performs worse for groups that were under-represented in its training data, the pattern is algorithmic bias. The other options name different categories of ethical problem."
    objective_tag: identify-ethical-issue
    difficulty: 1
    tags: [ai, vocabulary]
    related_terms: [algorithmic bias]
    source_key: WHO-AIEthics

  - id: q002
    type: multiple_choice
    stem: "Which ethical principle is most directly strained when a hospital's sepsis-prediction AI under-flags a specific patient subgroup?"
    options:
      - "Autonomy"
      - "Beneficence only"
      - "Justice (benefit and risk land on different groups)"
      - "Accountability is not an ethical principle"
    correct: 2
    rationale: "When benefit lands on one group and risk on another, justice is the central principle in play. Beneficence may be served on average while justice fails in the subgroup."
    objective_tag: apply-four-principles
    difficulty: 2
    tags: [ai, justice]
    related_terms: [justice, algorithmic bias]
    source_key: Beauchamp-Childress

  - id: q003
    type: multiple_choice
    stem: "Which of the following is NOT covered by the Genetic Information Nondiscrimination Act (GINA)?"
    options:
      - "Health insurance"
      - "Employment decisions"
      - "Life insurance"
      - "All of these are covered by GINA"
    correct: 2
    rationale: "GINA covers U.S. health insurance and employment but does not cover life insurance, disability insurance, or long-term-care insurance. A test-positive result can still affect those products."
    objective_tag: counter-misconception
    difficulty: 2
    tags: [genomics, misconception]
    related_terms: [genetic discrimination]
    misconception_addressed: "Misconception 1"
    source_key: GINA-Law

  - id: q004
    type: true_false
    stem: "Telehealth automatically improves healthcare access for every patient population."
    correct: false
    rationale: "Telehealth expands access only for patients who have broadband, a device, a private space, and digital skills. The digital divide means the same technology can widen inequities for patients without those resources."
    objective_tag: counter-misconception
    difficulty: 2
    tags: [telehealth, misconception]
    related_terms: [telehealth, digital divide, justice]
    misconception_addressed: "Misconception 2"
    source_key: ATA-Telehealth

  - id: q005
    type: multiple_choice
    stem: "A 16-year-old sends their saliva sample to a direct-to-consumer genetic testing company. The report reveals information about the teenager's biological parents as well. Whose autonomy is most strained in this case?"
    options:
      - "The teenager's, because they consented"
      - "The biological parents', whose genetic information was inferred without their consent"
      - "The company's, because it processed the sample"
      - "No one's — genetic data is private by default"
    correct: 1
    rationale: "Because genetic information is inherently familial, a test on one person reveals information about relatives who never consented. That is the autonomy problem unique to genomics."
    objective_tag: apply-four-principles
    difficulty: 3
    tags: [genomics, autonomy]
    related_terms: [autonomy, informed consent]
    source_key: NIH-PrivacyGenomics

  - id: q006
    type: true_false
    stem: "A smartwatch that flags atrial fibrillation should be treated as a diagnostic medical device equivalent to a clinical 12-lead ECG."
    correct: false
    rationale: "Most consumer wearables are screening tools, not diagnostic devices. A single alert has meaningful false-positive and false-negative rates and should prompt clinical follow-up rather than self-diagnosis."
    objective_tag: counter-misconception
    difficulty: 2
    tags: [wearables, misconception]
    related_terms: [wearable, non-maleficence]
    misconception_addressed: "Misconception 3"
    source_key: FDA-AIML

  - id: q007
    type: multiple_choice
    stem: "An unconscious ICU patient has no advance directive. Three adult children disagree about whether to continue life support. Which best describes the ethical situation?"
    options:
      - "The majority of the family decides"
      - "The hospital decides for liability reasons"
      - "The team and family must reconstruct the patient's prior wishes; an ethics consult helps weigh competing evidence"
      - "Life support must always continue when the family disagrees"
    correct: 2
    rationale: "Autonomy still centers on the patient's prior wishes, not the family's current preferences. Without an advance directive, clinicians and family reconstruct those wishes from evidence, often with an ethics consultation."
    objective_tag: counter-misconception
    difficulty: 3
    tags: [end-of-life, misconception]
    related_terms: [autonomy, advance directive, life-sustaining technology]
    misconception_addressed: "Misconception 4"
    source_key: Hastings-EOL

  - id: q008
    type: matching
    stem: "Match each of the four ethical principles to the question it most directly asks."
    left:
      - "Autonomy"
      - "Beneficence"
      - "Non-maleficence"
      - "Justice"
    right:
      - "Is the benefit distributed fairly? Who gets access?"
      - "Does the patient understand and consent to what is being done?"
      - "Will this technology help the patient?"
      - "Could this technology cause harm we should avoid?"
    correct: [[0, 1], [1, 2], [2, 3], [3, 0]]
    rationale: "Autonomy asks about informed consent; beneficence asks about benefit; non-maleficence asks about harm; justice asks about fair access and distribution."
    objective_tag: define-key-term
    difficulty: 1
    tags: [four-principles, vocabulary]
    related_terms: [autonomy, beneficence, non-maleficence, justice]
    source_key: Beauchamp-Childress

  - id: q009
    type: short_answer
    stem: "In two or three sentences, name a healthcare technology and describe one ethical principle it strengthens and one it strains."
    correct: "Any reasonable pairing is acceptable. Example: telehealth strengthens justice by expanding access for patients with broadband, while straining justice again for patients without broadband (the digital divide). Example: a diagnostic AI strengthens beneficence by catching disease earlier, while straining non-maleficence for subgroups the tool is biased against."
    rationale: "This item checks the central skill of the atom: naming a technology, a principle it serves, and a principle it stresses in one sentence."
    objective_tag: apply-four-principles
    difficulty: 2
    tags: [four-principles, synthesis]
    related_terms: [autonomy, beneficence, non-maleficence, justice]

  - id: q010
    type: multiple_choice
    stem: "A wearable manufacturer's terms of service allow sharing de-identified user data with advertisers and researchers. Most users click 'accept' without reading. Which ethical principle is most directly strained?"
    options:
      - "Non-maleficence, because the data causes physical harm"
      - "Autonomy, because consent in form is not consent in substance"
      - "Justice, because wearables are free"
      - "Beneficence, because data sharing always helps patients"
    correct: 1
    rationale: "Meaningful autonomy requires informed consent: the user must understand what they are agreeing to. Click-through acceptance of long terms of service is a formality, not substantive consent."
    objective_tag: apply-four-principles
    difficulty: 2
    tags: [wearables, autonomy]
    related_terms: [autonomy, informed consent, wearable]

  - id: q011
    type: multiple_choice
    stem: "A diagnostic AI produces a decision that harms a patient. Which statement best describes accountability in current practice?"
    options:
      - "The algorithm itself is legally responsible"
      - "No one is responsible because AI is new"
      - "Responsibility is contested among the developer, the hospital, and the clinician who used the output; regulators are still developing this area"
      - "The patient is responsible for agreeing to AI-assisted care"
    correct: 2
    rationale: "Accountability for AI errors in healthcare is unsettled. The FDA reviews some AI medical devices and monitors post-market performance, but the legal picture for clinical harm is evolving."
    objective_tag: identify-ethical-issue
    difficulty: 2
    tags: [ai, accountability]
    related_terms: [accountability]
    source_key: FDA-AIML

  - id: q012
    type: fill_blank
    stem: "A written document in which a person states the medical care they want — or do not want — if they cannot speak for themselves is called a(n) ______."
    correct: "advance directive"
    rationale: "Advance-directive identification. Direct LO coverage of end-of-life technology vocabulary."
    objective_tag: define-key-term
    difficulty: 1
    tags: [end-of-life, vocabulary]
    related_terms: [advance directive, autonomy]

  - id: q013
    type: short_answer
    stem: "A rural clinic replaces half its in-person visits with telehealth visits. Name one group of patients for whom access improves and one group for whom access gets worse, and explain why."
    correct: "Access improves for patients with reliable broadband, a device, and a private space to talk — they avoid travel and can fit a visit into a work day. Access worsens for patients without those resources, or for patients whose complaint requires physical examination; for them, the new option is not an option, and the in-person appointments they relied on may be less available. This is the digital divide."
    rationale: "This item probes the telehealth misconception at an application level — students must name the winners and losers of a policy, not just define the term."
    objective_tag: counter-misconception
    difficulty: 3
    tags: [telehealth, justice, synthesis]
    related_terms: [telehealth, digital divide, justice]
    misconception_addressed: "Misconception 2"
    source_key: ATA-Telehealth
