items:
  - id: q001
    type: fill_blank
    stem: "A patient weighs 132 pounds. What is their weight in kilograms? (Round to the nearest whole number.)"
    correct: "60"
    rationale: "132 ÷ 2.2 = 60 kg. The pound-to-kilogram conversion is the most common unit conversion in healthcare."
    objective_tag: unit-conversion
    difficulty: 1
    tags: [conversion, weight]
    related_terms: [unit conversion, pound, kilogram]

  - id: q002
    type: multiple_choice
    stem: "An order reads 'metronidazole .5 g PO q8h.' Which rule does this writing violate?"
    options:
      - "The abbreviation q8h is on the do-not-use list"
      - "A value less than 1 should always be written with a leading zero (0.5, not .5)"
      - "PO should be written as 'by mouth'"
      - "Metronidazole cannot be given orally"
    correct: 1
    rationale: "The ISMP and Joint Commission require a leading zero on any dose less than 1. Without it, .5 g can be misread as 5 g — a tenfold overdose."
    objective_tag: decimal-discipline
    difficulty: 1
    tags: [safety, decimal]
    related_terms: [decimal discipline, medication error]
    misconception_addressed: "Misconception 1"
    source_key: ISMP-Decimal

  - id: q003
    type: multiple_choice
    stem: "A child weighs 33 pounds. The physician orders an antibiotic at 20 mg/kg. What dose should be given?"
    options:
      - "300 mg"
      - "660 mg"
      - "33 mg"
      - "66 mg"
    correct: 0
    rationale: "Convert 33 lb ÷ 2.2 = 15 kg. Multiply 15 × 20 = 300 mg. Answer B (660 mg) comes from skipping the conversion and using pounds directly — a 2.2× overdose."
    objective_tag: weight-based-dosing
    difficulty: 2
    tags: [dosing, conversion]
    related_terms: [weight-based dosing, unit conversion, dose]
    misconception_addressed: "Misconception 2"
    source_key: AAP-PediDose

  - id: q004
    type: true_false
    stem: "A pharmacist computed the dose, so the bedside administering clinician does not need to verify it."
    correct: false
    rationale: "Every clinician at every handoff verifies weight-based doses. The bedside check is the last line of defense against the errors that slipped past earlier stages."
    objective_tag: safety-habit
    difficulty: 1
    tags: [safety]
    related_terms: [medication error]
    misconception_addressed: "Misconception 4"
    source_key: ISMP-Decimal

  - id: q005
    type: multiple_choice
    stem: "A fasting blood glucose reference range for adults is 70–99 mg/dL. A patient's reading is 110 mg/dL. How should you interpret this single value?"
    options:
      - "Definitely diabetic; start treatment immediately"
      - "Above the reference range; flag for provider review and check the trend over time"
      - "Normal; no action needed"
      - "A reading error — retest immediately"
    correct: 1
    rationale: "110 is above the fasting reference range but below the diabetic threshold (≥ 126 mg/dL on two occasions). The right move is to flag it and look at the trend — single values are rarely enough to act on."
    objective_tag: interpret-reference-range
    difficulty: 2
    tags: [lab-values]
    related_terms: [reference range, trend]
    misconception_addressed: "Misconception 3"
    source_key: AHA-Vital-Signs

  - id: q006
    type: short_answer
    stem: "A temperature reading is 101.3 °F. What is the approximate Celsius value, and how do you get it?"
    correct: "About 38.5 °C. Formula: (°F − 32) ÷ 1.8. So (101.3 − 32) ÷ 1.8 = 69.3 ÷ 1.8 ≈ 38.5 °C."
    rationale: "Temperature conversion is one of the four common conversions. Knowing the formula matters even when a converter app is available, because a worker often needs a mental estimate on the fly."
    objective_tag: unit-conversion
    difficulty: 2
    tags: [conversion, temperature]
    related_terms: [unit conversion]

  - id: q007
    type: multiple_choice
    stem: "A pediatric patient was at the 50th percentile for weight at 12 months, the 25th at 18 months, and the 10th at 24 months. What is the clinical concern?"
    options:
      - "None — these percentiles are all in the normal range"
      - "The child is falling off their growth curve, which is a flag regardless of the absolute percentile"
      - "The child is overweight"
      - "The measurements were likely inaccurate"
    correct: 1
    rationale: "What matters on a growth chart is not which curve a child is on, but whether they stay on the same curve. Crossing two percentile lines downward is a faltering-growth flag."
    objective_tag: interpret-growth-chart
    difficulty: 3
    tags: [pediatric, trend]
    related_terms: [percentile, growth chart, trend]
    source_key: CDC-GrowthCharts

  - id: q008
    type: fill_blank
    stem: "A medication order reads '1.0 mg.' Which decimal-discipline rule does this violate?"
    correct: "Trailing zero (should be written as 1 mg, not 1.0 mg)"
    rationale: "Trailing zeros can be misread — 1.0 mg can look like 10 mg. The rule: whole numbers are written without trailing zeros."
    objective_tag: decimal-discipline
    difficulty: 1
    tags: [safety]
    related_terms: [decimal discipline]
    source_key: TJC-DoNotUse

  - id: q009
    type: matching
    stem: "Match each US customary unit (left) to its metric conversion (right)."
    left:
      - "1 pound"
      - "1 fluid ounce"
      - "1 inch"
      - "1 teaspoon"
    right:
      - "5 mL"
      - "2.54 cm"
      - "about 0.454 kg"
      - "about 30 mL"
    correct: [[0, 2], [1, 3], [2, 1], [3, 0]]
    rationale: "These four conversions are the high-frequency ones a healthcare worker uses daily. Memorizing them should be automatic before graduation."
    objective_tag: unit-conversion
    difficulty: 1
    tags: [conversion]
    related_terms: [unit conversion, pound, kilogram]

  - id: q010
    type: multiple_choice
    stem: "Which statement best describes weight-based dosing?"
    options:
      - "A fixed dose used for all adults regardless of weight"
      - "Prescribing medication in proportion to patient weight, using mg/kg or similar ratios"
      - "A dosing strategy used only in intensive care"
      - "The same as maximum-allowed-dose policies"
    correct: 1
    rationale: "Weight-based dosing ties the dose to the patient's weight, most commonly expressed as mg/kg. It is the standard for pediatrics and for many adult medications as well."
    objective_tag: define-key-term
    difficulty: 1
    tags: [dosing]
    related_terms: [weight-based dosing, dose]
    source_key: OpenStax-PharmMath

  - id: q011
    type: short_answer
    stem: "A handwritten order reads 'Atenolol .5 mg po BID.' Rewrite it to follow decimal-discipline rules."
    correct: "Atenolol 0.5 mg po BID. The change: add a leading zero before the decimal (0.5 instead of .5)."
    rationale: "Leading-zero rule applies here. The 'mg,' 'po,' and 'BID' are not the decimal problem — only the missing leading zero is."
    objective_tag: decimal-discipline
    difficulty: 2
    tags: [safety, decimal]
    related_terms: [decimal discipline]
    source_key: ISMP-Decimal

  - id: q012
    type: true_false
    stem: "Percentile on a growth chart describes a child's weight relative to a reference population, not an absolute weight."
    correct: true
    rationale: "Percentile is a ranking against peers of the same age and sex. A 25th-percentile weight means the child is heavier than 25 percent and lighter than 75 percent of reference-population peers."
    objective_tag: define-key-term
    difficulty: 1
    tags: [pediatric]
    related_terms: [percentile, growth chart]
    source_key: CDC-GrowthCharts

  - id: q013
    type: short_answer
    stem: "Explain in two or three sentences why every healthcare worker double-checks a weight-based dose at the bedside, even after the pharmacy has computed it."
    correct: "Medication errors happen at every stage — prescribing, transcribing, dispensing, administering. Every clinician treats the bedside check as the last line of defense. A dose that was computed correctly from an incorrect weight or unit is still wrong, and only a final check catches that."
    rationale: "This synthesizes decimal discipline with the safety-culture habit. Students who answer 'the pharmacy might not be perfect' are on the right track; expanding to 'errors happen at every stage' is a stronger answer."
    objective_tag: explain-safety-habit
    difficulty: 3
    tags: [safety, synthesis]
    related_terms: [medication error, decimal discipline]
    misconception_addressed: "Misconception 4"
