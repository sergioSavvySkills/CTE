items:
  - id: q001
    type: multiple_choice
    stem: "Which figure best describes the approximate share of U.S. gross domestic product spent on healthcare in recent years, per CMS National Health Expenditure data?"
    options:
      - "About 5-6%"
      - "About 10-11%"
      - "About 17-18%"
      - "About 30-35%"
    correct: 2
    rationale: "CMS's National Health Expenditure series has shown U.S. healthcare spending at roughly 17-18% of GDP in recent years, making it one of the largest sectors of the economy."
    objective_tag: describe-scale
    difficulty: 1
    tags: [scale, vocabulary]
    related_terms: [national health expenditure, gross domestic product]
    source_key: CMS-NHE

  - id: q002
    type: true_false
    stem: "More than 20 million workers are employed in U.S. healthcare settings according to the Bureau of Labor Statistics Occupational Outlook Handbook."
    correct: true
    rationale: "BLS OOH data show healthcare employment above 20 million workers across nursing, medical, technologist, aide, and administrative roles, making healthcare one of the largest employment categories in the country."
    objective_tag: describe-scale
    difficulty: 1
    tags: [scale, workforce]
    related_terms: [national health expenditure]
    source_key: BLS-OOH

  - id: q003
    type: multiple_choice
    stem: "Which of the following is NOT typically listed as a structural cost driver of U.S. healthcare spending?"
    options:
      - "New medical technology and therapies"
      - "Rising prescription drug prices"
      - "Administrative complexity of billing and coding"
      - "Patients choosing to get annual physicals"
    correct: 3
    rationale: "Technology, drug prices, administrative complexity, chronic disease, and aging are the structural drivers named in federal analyses. Routine preventive care is associated with lower long-run costs, not higher."
    objective_tag: describe-scale
    difficulty: 2
    tags: [cost-drivers]
    related_terms: [cost driver]
    misconception_addressed: "Misconception 3"
    source_key: CBO-HealthSpending

  - id: q004
    type: multiple_choice
    stem: "Which statement best captures the framework idea behind value-based care?"
    options:
      - "Providers are paid a fixed salary regardless of patient outcomes"
      - "Payment is tied to outcomes, quality, or total cost of an episode rather than the volume of services delivered"
      - "Patients pay providers directly for each test and procedure"
      - "Only Medicare pays providers; private insurance does not participate"
    correct: 1
    rationale: "Value-based care is a design philosophy that ties payment to outcomes and efficiency rather than volume, so providers have a financial reason to coordinate and prevent avoidable problems."
    objective_tag: describe-scale
    difficulty: 2
    tags: [payment, vocabulary]
    related_terms: [value-based care, bundled payment]
    misconception_addressed: "Misconception 4"
    source_key: CMS-ValueBased

  - id: q005
    type: fill_blank
    stem: "A single payment that covers all services tied to one episode of care — for example, a joint replacement and its follow-up — and is shared across the providers involved is called a ______ payment."
    correct: "bundled"
    rationale: "A bundled payment covers an episode and is split across participating providers, giving them a reason to coordinate rather than duplicate work."
    objective_tag: describe-scale
    difficulty: 1
    tags: [payment, vocabulary]
    related_terms: [bundled payment, value-based care]
    source_key: CMS-ValueBased

  - id: q006
    type: multiple_choice
    stem: "A state legislature passes a law changing what a licensed pharmacist is allowed to do. Which government lever is primarily in play?"
    options:
      - "Federal drug approval through FDA"
      - "State licensure and scope of practice"
      - "Local public-health inspection"
      - "NIH research funding"
    correct: 1
    rationale: "States license health professionals and set scope-of-practice rules. A change to what a pharmacist may do is a state licensure change, not a federal or local one."
    objective_tag: analyze-government-roles
    difficulty: 2
    tags: [licensure, state]
    related_terms: [licensure]
    misconception_addressed: "Misconception 1"

  - id: q007
    type: matching
    stem: "Match each federal agency (left) to its primary healthcare role (right)."
    left:
      - "CMS"
      - "FDA"
      - "CDC"
      - "NIH"
      - "HRSA"
    right:
      - "Leads national public-health surveillance, outbreak response, and immunization guidance"
      - "Supports safety-net providers such as community health centers and rural workforce programs"
      - "Runs Medicare and co-administers Medicaid with the states"
      - "Funds biomedical research through grants to universities and other institutions"
      - "Reviews drugs and medical devices for safety and effectiveness before they can be sold"
    correct: [[0, 2], [1, 4], [2, 0], [3, 3], [4, 1]]
    rationale: "CMS = coverage and payment for Medicare/Medicaid; FDA = drug and device approval; CDC = public-health leadership; NIH = research funding; HRSA = safety-net and workforce support."
    objective_tag: analyze-government-roles
    difficulty: 2
    tags: [federal, agencies]
    related_terms: [CMS, FDA, Medicare, Medicaid, safety-net provider]
    source_key: CMS-NHE

  - id: q008
    type: multiple_choice
    stem: "Medicaid is best described as:"
    options:
      - "A federal-only program identical in every state"
      - "A state-only program with no federal rules or funding"
      - "A joint federal-state program in which CMS sets federal rules and each state runs its own program within those rules"
      - "A private insurance product regulated by the federal government"
    correct: 2
    rationale: "Medicaid is jointly administered. CMS sets the federal framework, and each state decides optional expansions, benefits beyond the federal minimum, and managed-care contracting within that framework."
    objective_tag: analyze-government-roles
    difficulty: 1
    tags: [medicaid, shared-roles]
    related_terms: [Medicaid, CMS]
    source_key: KFF-Medicaid

  - id: q009
    type: multiple_choice
    stem: "A county health department investigates a suspected foodborne-illness outbreak linked to a local restaurant. Which layer of government is primarily acting?"
    options:
      - "Federal — the FDA inspects every restaurant"
      - "State — the state health department inspects restaurants directly"
      - "Local — county or city health departments run routine food-safety inspection and outbreak investigation"
      - "None — restaurant inspections are not a government function"
    correct: 2
    rationale: "Restaurant inspection and local outbreak investigation are local public-health functions, typically run by county or city health departments in coordination with state and federal partners."
    objective_tag: analyze-government-roles
    difficulty: 1
    tags: [local, public-health]
    related_terms: [public health]
    misconception_addressed: "Misconception 1"
    source_key: NACCHO-LHD

  - id: q010
    type: true_false
    stem: "A patient covered by employer-based private insurance receives care that is entirely unaffected by government spending or rules."
    correct: false
    rationale: "Medicare payment rules anchor what hospitals charge private payers, states license the facility and clinicians, and federal safety and quality regulations apply across the sector. Government shapes the system even where it is not the direct payer."
    objective_tag: describe-scale
    difficulty: 2
    tags: [coverage, scale]
    related_terms: [Medicare, national health expenditure]
    misconception_addressed: "Misconception 2"
    source_key: CMS-NHE

  - id: q011
    type: multiple_choice
    stem: "Which of the following is an example of a safety-net provider supported by HRSA?"
    options:
      - "A for-profit specialty hospital in a wealthy suburb"
      - "A federally qualified community health center serving uninsured and low-income patients"
      - "A private physician practice that does not accept Medicaid"
      - "A retail pharmacy chain"
    correct: 1
    rationale: "HRSA supports community health centers and rural-health programs that provide care regardless of ability to pay. Those are the archetypal safety-net providers."
    objective_tag: analyze-government-roles
    difficulty: 1
    tags: [federal, safety-net]
    related_terms: [safety-net provider]
    source_key: HRSA-Overview

  - id: q012
    type: short_answer
    stem: "In two or three sentences, explain why healthcare costs are expected to keep rising even in a population that improves its health behaviors."
    correct: "Structural cost drivers — new technology, rising drug prices, administrative complexity, and an aging population — push total spending upward independent of individual behavior. Better health behaviors can reduce some chronic-disease costs, but they do not offset the fact that people live longer and use more services, that new therapies cost more, and that running a complex payment system is expensive."
    rationale: "Strong answers name multiple structural drivers (technology, drug prices, administrative complexity, aging), acknowledge that behavior change helps with a portion but not the majority, and connect the framing to why system-level reforms like value-based care exist."
    objective_tag: describe-scale
    difficulty: 3
    tags: [synthesis, cost-drivers]
    related_terms: [cost driver, value-based care, national health expenditure]
    misconception_addressed: "Misconception 3"
    source_key: CBO-HealthSpending

  - id: q013
    type: short_answer
    stem: "A new community health center opens in a rural county. Name one federal, one state, and one local government role involved in making that clinic possible."
    correct: "Federal: HRSA grant funding supports startup and ongoing operations as a safety-net provider, and CMS rules govern how the center bills Medicare and Medicaid. State: the state licenses the facility and its clinicians, and the state Medicaid agency signs the provider agreement. Local: the county health department coordinates on public-health functions such as immunization and communicable-disease reporting, and local zoning and building inspection cleared the space."
    rationale: "Strong answers identify a distinct role at each layer, use correct vocabulary (licensure, safety-net provider, Medicaid), and show that the layers combine rather than one running the others."
    objective_tag: analyze-government-roles
    difficulty: 3
    tags: [synthesis, layers]
    related_terms: [licensure, safety-net provider, Medicaid, public health]
    misconception_addressed: "Misconception 1"
    source_key: HRSA-Overview
