items:
  - id: q001
    type: multiple_choice
    stem: "Which statement best captures the distinction between cultural competence and cultural humility?"
    options:
      - "Competence is a set of learned facts and skills; humility is a lifelong posture of self-reflection and curiosity"
      - "Competence is for experienced clinicians; humility is for students"
      - "Competence applies to race and ethnicity; humility applies to language"
      - "Competence is the same as humility under a different name"
    correct: 0
    rationale: "Cultural competence names the learnable content; cultural humility names the ongoing posture that keeps that content from becoming a stereotype. A clinician needs both, with humility doing the ongoing work."
    objective_tag: distinguish-competence-humility
    difficulty: 1
    tags: [vocabulary, core-distinction]
    related_terms: [cultural competence, cultural humility]
    source_key: Tervalon-Humility

  - id: q002
    type: true_false
    stem: "A written brief of dietary and modesty practices for a given culture is sufficient for caring for any patient who identifies with that culture."
    correct: false
    rationale: "Patterns are useful background, but treating them as predictions about an individual patient is a stereotype. The correct move is to ask the patient directly and adapt to their answer."
    objective_tag: distinguish-competence-humility
    difficulty: 1
    tags: [safety-culture]
    related_terms: [cultural humility, stereotype, cultural competence]
    misconception_addressed: "Misconception 1"
    source_key: Tervalon-Humility

  - id: q003
    type: multiple_choice
    stem: "A clinician says, 'I treat every patient the same, regardless of race or background — that's fair.' What is the most accurate response?"
    options:
      - "Agree — identical treatment is always equitable"
      - "Identical treatment is not equitable when patients face different barriers; health equity requires adjusting care so every patient has a fair opportunity at a good outcome"
      - "Agree — talking about differences is the real problem"
      - "Disagree — clinicians should give more care to the patients who ask for more"
    correct: 1
    rationale: "Equity is about fair opportunity at a good outcome, not identical inputs. A patient who cannot read English gets less from the same discharge packet than a patient who can."
    objective_tag: recognize-disparities
    difficulty: 2
    tags: [equity, safety-culture]
    related_terms: [health equity, health disparity]
    misconception_addressed: "Misconception 2"
    source_key: CDC-Disparities

  - id: q004
    type: multiple_choice
    stem: "A patient with limited English proficiency arrives for an intake. Her adult son offers to translate to save time. What is the best practice?"
    options:
      - "Accept the son's offer — family interpretation is the standard of care"
      - "Offer the patient a qualified medical interpreter through the facility; use the son only for incidental communication after she declines the qualified interpreter"
      - "Ask the son to translate only the medical parts, not the personal parts"
      - "Proceed in English and assume the patient will understand enough"
    correct: 1
    rationale: "Qualified medical interpreters are trained in medical vocabulary and bound by confidentiality. Family, especially children, may filter content, lack vocabulary, and cannot hold clinical confidentiality."
    objective_tag: adapt-to-patient
    difficulty: 2
    tags: [interpreter, communication]
    related_terms: [qualified medical interpreter, limited English proficiency, CLAS standards]
    misconception_addressed: "Misconception 3"
    source_key: AHRQ-Interpreter

  - id: q005
    type: multiple_choice
    stem: "When working with a qualified medical interpreter during an intake, which is the correct communication habit?"
    options:
      - "Speak to the interpreter: 'Ask her how she's feeling'"
      - "Speak directly to the patient in short, idiom-free sentences and pause for interpretation"
      - "Use long, complete explanations so no details are lost in translation"
      - "Skip the teach-back — interpreter accuracy makes it unnecessary"
    correct: 1
    rationale: "Direct address to the patient and short, clear sentences are standard interpreter-use habits. Teach-back remains essential because it confirms the patient's understanding, not the interpreter's fluency."
    objective_tag: adapt-to-patient
    difficulty: 1
    tags: [interpreter, technique]
    related_terms: [qualified medical interpreter, teach-back]
    source_key: AHRQ-Interpreter

  - id: q006
    type: true_false
    stem: "Implicit bias can shape clinical decisions even in clinicians who sincerely hold egalitarian values."
    correct: true
    rationale: "Implicit bias is an automatic association built up over a lifetime and is separate from stated beliefs. Denying it is the main thing that keeps it in place."
    objective_tag: recognize-disparities
    difficulty: 1
    tags: [bias]
    related_terms: [implicit bias]
    misconception_addressed: "Misconception 4"
    source_key: IOM-Unequal

  - id: q007
    type: multiple_choice
    stem: "A clinician reviews their records and finds they prescribed less pain medication to Black patients than to white patients with the same diagnosis last year. What is the most constructive interpretation?"
    options:
      - "The data means the clinician is a bad person and should leave clinical practice"
      - "The data reflects implicit bias showing up in outcomes despite good values; the response is to adopt a standard pain-assessment habit used the same way every time"
      - "The data is probably wrong because the clinician does not feel prejudiced"
      - "The data proves the patients were different, not the care"
    correct: 1
    rationale: "Implicit bias is a description of cognition under pressure, not a verdict on character. The constructive response is a concrete habit — a standard assessment tool used uniformly — that reduces variance."
    objective_tag: recognize-disparities
    difficulty: 3
    tags: [bias, reflection]
    related_terms: [implicit bias, health disparity]
    misconception_addressed: "Misconception 4"
    source_key: IOM-Unequal

  - id: q008
    type: multiple_choice
    stem: "Which of the following best illustrates a social determinant of health affecting a discharge plan?"
    options:
      - "The patient's hemoglobin A1c"
      - "The patient lives 45 minutes from the nearest pharmacy and works hourly shifts with no paid sick time"
      - "The patient's allergy to penicillin"
      - "The patient's blood pressure at discharge"
    correct: 1
    rationale: "Transportation, work schedule, and paid leave shape whether a plan survives outside the hospital. These non-clinical conditions often drive outcomes more than any medication adjustment."
    objective_tag: recognize-disparities
    difficulty: 2
    tags: [social-determinants]
    related_terms: [social determinants of health, health disparity]
    source_key: NAM-SDOH

  - id: q009
    type: fill_blank
    stem: "A communication check in which the patient restates key information in their own words to confirm understanding is called a ______."
    correct: "teach-back"
    rationale: "Teach-back moves from 'any questions?' to actually verifying that the patient can describe the plan in their own words. It is especially important when language or literacy barriers are in play."
    objective_tag: adapt-to-patient
    difficulty: 1
    tags: [vocabulary, communication]
    related_terms: [teach-back]

  - id: q010
    type: multiple_choice
    stem: "Mrs. Nguyen's adult daughter says, 'In our family, the family decides together.' What is the best next step?"
    options:
      - "Proceed by talking only to the daughter, since she described the family's practice"
      - "Proceed by talking only to Mrs. Nguyen, since autonomy overrides family preference"
      - "Ask Mrs. Nguyen directly how she wants the conversation to happen; if she wants family involved, convene the conversation and keep the consent decision with her"
      - "Refer the decision to the ethics committee before any conversation"
    correct: 2
    rationale: "Neither the 'family decides' nor the 'patient alone' assumption fits every patient. Ask the patient, adapt the conversation to her answer, and keep consent with her."
    objective_tag: adapt-to-patient
    difficulty: 2
    tags: [consent, family]
    related_terms: [cultural humility, stereotype]
    misconception_addressed: "Misconception 1"

  - id: q011
    type: matching
    stem: "Match each term (left) to its best description (right)."
    left:
      - "cultural humility"
      - "social determinants of health"
      - "implicit bias"
      - "qualified medical interpreter"
    right:
      - "An automatic association that can shape clinical decisions even when values are egalitarian"
      - "A lifelong posture of self-reflection and curiosity in caring for patients different from you"
      - "A trained professional bound by confidentiality who interprets between patient and clinician"
      - "Non-clinical conditions — income, housing, transportation, food access — that shape health outcomes"
    correct: [[0, 1], [1, 3], [2, 0], [3, 2]]
    rationale: "These four anchor terms carry the atom: the posture, the population-level conditions, the cognitive phenomenon, and the communication tool."
    objective_tag: distinguish-competence-humility
    difficulty: 2
    tags: [vocabulary]
    related_terms: [cultural humility, social determinants of health, implicit bias, qualified medical interpreter]

  - id: q012
    type: short_answer
    stem: "In two or three sentences, explain why a clinician who memorizes a detailed brief on a cultural group may still provide poor care to a patient from that group."
    correct: "A brief describes a pattern, not the individual patient. Two people from the same community often disagree about what their culture requires, and applying the brief as a rule overrides what this patient actually says. Cultural humility — asking the patient, listening, and adapting — is what turns the brief from a stereotype into useful background."
    rationale: "Strong answers name the shift from group pattern to individual prediction as the error, name the asking/listening/adapting habit as the fix, and use 'stereotype' and 'cultural humility' correctly."
    objective_tag: distinguish-competence-humility
    difficulty: 3
    tags: [synthesis]
    related_terms: [cultural competence, cultural humility, stereotype]
    misconception_addressed: "Misconception 1"
    source_key: Tervalon-Humility

  - id: q013
    type: short_answer
    stem: "Name two documented patterns of disparity linked to implicit bias in U.S. healthcare, and state one clinician-level habit that helps counteract them."
    correct: "Black patients receive less adequate pain treatment than white patients with the same diagnosis, and Black women experience higher maternal mortality than white women independent of income or education. A counteracting habit is to use a standard assessment tool the same way every time, and to confirm the plan with teach-back rather than assuming understanding."
    rationale: "Strong answers cite the pain-treatment and maternal-mortality patterns, attribute them to aggregate implicit bias plus structural factors rather than individual bad actors, and name a standardized habit as the fix."
    objective_tag: recognize-disparities
    difficulty: 3
    tags: [synthesis, bias]
    related_terms: [implicit bias, health disparity, teach-back]
    misconception_addressed: "Misconception 2"
    source_key: IOM-Unequal
