items:
  - id: q001
    type: multiple_choice
    stem: "Two nurses disagree about whether a stable patient is ready to transition from IV to oral medications. Stakes are high and there is time to discuss. Which conflict style fits best?"
    options:
      - "Avoid — let the next shift sort it out"
      - "Accommodate — the more senior nurse's view wins"
      - "Compromise — each gives up something to reach a middle"
      - "Collaborate — surface each nurse's underlying concern and build a plan that addresses both"
    correct: 3
    rationale: "High-stakes, time-available clinical decisions call for collaborate. Each clinician has information the other needs, and a split-the-difference compromise would not serve the patient."
    objective_tag: evaluate-conflict-style
    difficulty: 2
    tags: [styles, application]
    related_terms: [collaborate, conflict style, compromise]
    source_key: Thomas-Kilmann

  - id: q002
    type: multiple_choice
    stem: "A family member is yelling in the hallway about a delayed test. What is the most effective first sentence?"
    options:
      - "Ma'am, please lower your voice."
      - "I can see this wait has been awful — I am so sorry today has been this hard."
      - "The scanner was backed up by an emergency, so nothing could have been done."
      - "Let me explain the scheduling policy for imaging."
    correct: 1
    rationale: "De-escalation starts with acknowledgement and empathy, not with explanations, policy, or a volume request. The CANDOR pattern opens with acknowledge and apologize-for-the-experience before anything else."
    objective_tag: apply-de-escalation
    difficulty: 2
    tags: [de-escalation, patient-family]
    related_terms: [de-escalation, active listening]
    misconception_addressed: "Misconception 3"
    source_key: AHRQ-CANDOR

  - id: q003
    type: true_false
    stem: "Saying 'I am sorry this has been so hard today' to an upset family member is the same as admitting that staff made a clinical error."
    correct: false
    rationale: "An expression of empathy is not a disclosure of fault. The CANDOR model treats early empathy as a core de-escalation move, separate from the formal clinical-error disclosure process."
    objective_tag: apply-de-escalation
    difficulty: 1
    tags: [de-escalation, safety-culture]
    related_terms: [de-escalation]
    misconception_addressed: "Misconception 3"
    source_key: AHRQ-CANDOR

  - id: q004
    type: multiple_choice
    stem: "A senior nurse is about to give a medication that you believe was discontinued. She brushes off your first polite mention. What is the correct next step?"
    options:
      - "Drop it — you raised it once"
      - "Repeat the concern more explicitly using CUS language, and if still dismissed, escalate up the chain of command"
      - "Wait and document after the dose is given"
      - "Tell another coworker what happened"
    correct: 1
    rationale: "The two-challenge rule requires a second, explicit mention when the first is ignored, followed by escalation if still dismissed. CUS ('concerned / uncomfortable / safety issue') gives a fixed script for the second challenge."
    objective_tag: apply-team-script
    difficulty: 2
    tags: [team-conflict, speaking-up]
    related_terms: [CUS, two-challenge rule, chain of command]
    misconception_addressed: "Misconception 1"
    source_key: TeamSTEPPS

  - id: q005
    type: multiple_choice
    stem: "Which statement is a correct I statement?"
    options:
      - "You never listen to me during report."
      - "You are rude and unprofessional."
      - "I feel talked over when report is interrupted by the TV."
      - "Everyone on this shift ignores me."
    correct: 2
    rationale: "An I statement names your own feeling or observation without diagnosing the other person's character. The other options assign labels to the listener, which invites defense."
    objective_tag: apply-communication-skill
    difficulty: 1
    tags: [communication, vocabulary]
    related_terms: [I statement, reframing]

  - id: q006
    type: true_false
    stem: "Collaborate and compromise are two names for the same conflict style — splitting the difference."
    correct: false
    rationale: "Compromise is middle-meeting: each side gives up something for a 'good enough' outcome. Collaborate surfaces each side's underlying interests and builds a solution that meets both — different process and different situation fit."
    objective_tag: evaluate-conflict-style
    difficulty: 2
    tags: [styles, vocabulary]
    related_terms: [collaborate, compromise, conflict style]
    misconception_addressed: "Misconception 2"
    source_key: Thomas-Kilmann

  - id: q007
    type: ordering
    stem: "Order the four moves of de-escalating an upset patient or family (CANDOR pattern) from first to last."
    options:
      - "Acknowledge what has happened and what the person seems to be feeling"
      - "Apologize for the experience where appropriate"
      - "Explain briefly and honestly what you know"
      - "Offer a concrete next step with a time window"
    correct: [0, 1, 2, 3]
    rationale: "Acknowledge-apologize-explain-next-step is the CANDOR sequence. Jumping to explanation or to the next step without acknowledgement is the most common error."
    objective_tag: apply-de-escalation
    difficulty: 2
    tags: [de-escalation, sequence]
    related_terms: [de-escalation, active listening]
    source_key: AHRQ-CANDOR

  - id: q008
    type: multiple_choice
    stem: "Your coworker snapped at you once during a busy code. The rest of your shifts together have been normal. How should you handle it?"
    options:
      - "File a disruptive-behavior report immediately"
      - "Have a direct, private I-statement conversation with the coworker"
      - "Tell three other coworkers about it in the break room"
      - "Text the charge nurse a screenshot of the interaction"
    correct: 1
    rationale: "A single stressed moment is not disruptive behavior, which by definition is a pattern. A direct private I-statement conversation resolves most peer conflict without needing escalation."
    objective_tag: distinguish-pattern-from-incident
    difficulty: 2
    tags: [team-conflict, pitfalls]
    related_terms: [disruptive behavior, I statement]
    misconception_addressed: "Misconception 4"
    source_key: ANA-Bullying

  - id: q009
    type: multiple_choice
    stem: "Which situation clearly requires escalation beyond a peer conversation, rather than a direct I-statement talk?"
    options:
      - "A coworker took the last piece of equipment you needed"
      - "Your coworker had a short reply to you during a code"
      - "A technician has publicly mocked a coworker for three weeks and refused to help with a two-person transfer"
      - "A nurse disagrees with your timing on a med pass"
    correct: 2
    rationale: "A pattern of public put-downs plus a patient-safety implication (refusing the two-person transfer) meets the professional threshold for disruptive behavior and requires escalation up the chain of command."
    objective_tag: distinguish-pattern-from-incident
    difficulty: 2
    tags: [team-conflict, escalation]
    related_terms: [disruptive behavior, chain of command]
    misconception_addressed: "Misconception 4"
    source_key: TJC-Workplace

  - id: q010
    type: matching
    stem: "Match each conflict style (left) to the situation it fits best (right)."
    left:
      - "avoid"
      - "accommodate"
      - "compete"
      - "compromise"
      - "collaborate"
    right:
      - "A scheduling preference between two coworkers with ten minutes before shift"
      - "A safety line has been crossed and there is no time to negotiate"
      - "The issue matters much more to the other person than to you"
      - "Emotions are too hot to reason right now"
      - "High-stakes clinical decision, time available, each side holds key information"
    correct: [[0, 3], [1, 2], [2, 1], [3, 0], [4, 4]]
    rationale: "Each style has its right moment. Collaborate fits the high-stakes clinical default; avoid fits when heat is too high for reason; compete fits a safety line; accommodate fits low stakes for you; compromise fits moderate stakes and limited time."
    objective_tag: evaluate-conflict-style
    difficulty: 3
    tags: [styles, matching]
    related_terms: [conflict style, collaborate, compromise, accommodate]
    source_key: Thomas-Kilmann

  - id: q011
    type: fill_blank
    stem: "The TeamSTEPPS script for speaking up about a concern — 'I am Concerned, I am Uncomfortable, this is a Safety issue' — is abbreviated as ______."
    correct: "CUS"
    rationale: "CUS is the three-step speaking-up script in TeamSTEPPS, with each level one step stronger than the last."
    objective_tag: apply-team-script
    difficulty: 1
    tags: [vocabulary, team-conflict]
    related_terms: [CUS, two-challenge rule]
    source_key: TeamSTEPPS

  - id: q012
    type: short_answer
    stem: "A new aide says she feels unsafe speaking up when a senior nurse's technique looks wrong. In two or three sentences, explain why avoidance is not the professional default and which specific tools she can use."
    correct: "Avoidance is one of five conflict styles and fits only when the issue is trivial or emotions need to cool; on a clinical team it is not the default because unresolved concerns turn into patient-safety events. She can use CUS ('I am concerned / uncomfortable / this is a safety issue') as a fixed three-step script, apply the two-challenge rule if her first concern is dismissed, and escalate up the chain of command if needed. These tools exist so junior staff have a safe way to persist."
    rationale: "A strong answer names the style framework (avoidance is situational, not default), connects silent avoidance to preventable harm, and names at least CUS and the two-challenge rule as the specific scripts the aide can use."
    objective_tag: apply-team-script
    difficulty: 3
    tags: [synthesis, speaking-up]
    related_terms: [CUS, two-challenge rule, chain of command, conflict style]
    misconception_addressed: "Misconception 1"
    source_key: TeamSTEPPS

  - id: q013
    type: multiple_choice
    stem: "A coworker complains to you in the hallway: 'Nobody ever tells me anything about my patients after I go to lunch.' You want to reframe this into something the team can act on. Which reframe works best?"
    options:
      - "You need to be less sensitive about lunch."
      - "Our post-lunch handoff is inconsistent — can we add a 30-second verbal update when you come back?"
      - "I also feel ignored sometimes."
      - "That sounds like a personal problem with the other nurses."
    correct: 1
    rationale: "Reframing takes a complaint the team cannot act on ('nobody tells me anything') and turns it into a specific process change ('add a 30-second post-lunch verbal update'). The reframe preserves the underlying concern while making it actionable."
    objective_tag: apply-communication-skill
    difficulty: 2
    tags: [communication, team-conflict]
    related_terms: [reframing, active listening, I statement]
