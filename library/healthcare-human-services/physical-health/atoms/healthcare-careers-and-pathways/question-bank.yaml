items:
  - id: q001
    type: multiple_choice
    stem: "Which of the following best describes what a 'career family' means in healthcare?"
    options:
      - "A single job title like 'registered nurse'"
      - "A grouping of healthcare roles that share a common purpose, such as diagnostic services or health informatics"
      - "The set of family members who work at the same hospital"
      - "A legal category used on a state license"
    correct: 1
    rationale: "A career family is a grouping of occupations that share a common purpose — therapeutic services, diagnostic services, health informatics, support services, biotechnology, and nursing. Seeing families before individual titles keeps the map manageable."
    objective_tag: identify-career-families
    difficulty: 1
    tags: [vocabulary, families]
    related_terms: [career family, therapeutic services, diagnostic services]
    source_key: OnetOnline

  - id: q002
    type: matching
    stem: "Match each healthcare role (left) to its career family (right)."
    left:
      - "Respiratory therapist"
      - "Sonographer"
      - "Medical coder"
      - "Central sterile processing technician"
      - "Clinical research coordinator"
    right:
      - "Diagnostic services"
      - "Health informatics"
      - "Therapeutic services"
      - "Biotechnology"
      - "Support services"
    correct: [[0, 2], [1, 0], [2, 1], [3, 4], [4, 3]]
    rationale: "Respiratory therapy treats patients over time (therapeutic). Sonography gathers images to identify conditions (diagnostic). Medical coding manages health data (informatics). Central sterile keeps a facility running (support). Clinical research coordinators work in industry or academic labs (biotechnology)."
    objective_tag: identify-career-families
    difficulty: 2
    tags: [families, matching]
    related_terms: [therapeutic services, diagnostic services, health informatics, support services, biotechnology]
    source_key: BLS-OOH

  - id: q003
    type: multiple_choice
    stem: "A student has savings for about one year of school and needs to start earning wages by the end of year two. Which starting credential fits that constraint best?"
    options:
      - "A medical degree (MD)"
      - "A doctorate in physical therapy (DPT)"
      - "A certificate or associate-level credential such as CNA, phlebotomy, or an associate in radiologic technology"
      - "A bachelor's in health administration followed by a master's"
    correct: 2
    rationale: "A certificate or associate-level credential completes inside the student's time-and-money constraint and begins paying wages by year one or two. The graduate routes require many more years of full-time study."
    objective_tag: map-realistic-pathway
    difficulty: 2
    tags: [pathway, constraints]
    related_terms: [certificate, associate degree, self-alignment]
    misconception_addressed: "Misconception 1"
    source_key: BLS-OOH

  - id: q004
    type: true_false
    stem: "Nursing and medicine are the only two healthcare career families worth considering; everything else is optional support."
    correct: false
    rationale: "Diagnostic services, health informatics, support services, and biotechnology each employ large workforces alongside nursing and medicine. A student who only sees nursing and physicians misses most of the healthcare career map."
    objective_tag: identify-career-families
    difficulty: 1
    tags: [families, scope]
    related_terms: [career family, diagnostic services, health informatics, biotechnology]
    misconception_addressed: "Misconception 2"
    source_key: OnetOnline

  - id: q005
    type: ordering
    stem: "Order the four rungs of the healthcare education ladder from shortest to longest typical training time."
    options:
      - "Certificate"
      - "Associate degree"
      - "Bachelor's degree"
      - "Graduate degree"
    correct: [0, 1, 2, 3]
    rationale: "Certificates are the shortest (weeks to about a year), associate degrees take about two years, bachelor's about four, and graduate degrees add two or more on top of a bachelor's."
    objective_tag: compare-education-requirements
    difficulty: 1
    tags: [education-ladder, sequence]
    related_terms: [certificate, associate degree, bachelor's degree, graduate degree]
    source_key: BLS-OOH

  - id: q006
    type: multiple_choice
    stem: "You want to compare the current typical pay and job outlook for a specific healthcare role. Which source should you check?"
    options:
      - "A social-media post from a nursing influencer"
      - "The BLS Occupational Outlook Handbook at bls.gov/ooh"
      - "A university brochure"
      - "A salary number a friend heard from a cousin"
    correct: 1
    rationale: "The Occupational Outlook Handbook is the U.S. Bureau of Labor Statistics' authoritative, annually updated resource for pay ranges, education requirements, and projected growth by occupation."
    objective_tag: compare-education-requirements
    difficulty: 1
    tags: [sources, salary]
    related_terms: [job outlook]
    source_key: BLS-OOH

  - id: q007
    type: true_false
    stem: "If the Occupational Outlook Handbook shows a median wage of $80,000 for a role, an individual in that role will earn close to $80,000 regardless of geography, specialty, or experience."
    correct: false
    rationale: "The median is a national midpoint. Actual earnings vary widely by geography, specialty, employer type, shift differential, overtime, and seniority. Treat the median as an order-of-magnitude band, not a personal forecast."
    objective_tag: compare-education-requirements
    difficulty: 2
    tags: [salary, interpretation]
    related_terms: [job outlook]
    misconception_addressed: "Misconception 3"
    source_key: BLS-OOH

  - id: q008
    type: multiple_choice
    stem: "Which set of forces is the primary driver behind the strong job outlook for most healthcare occupations?"
    options:
      - "A shrinking population and falling chronic-disease rates"
      - "An aging population, rising chronic-disease burden, and technology adoption such as electronic health records and telehealth"
      - "Government mandates that every citizen train as a clinician"
      - "Declining interest in other industries"
    correct: 1
    rationale: "Aging demographics, growing chronic-disease care needs, and healthcare technology adoption together drive the above-average growth projections for most healthcare occupations."
    objective_tag: compare-education-requirements
    difficulty: 2
    tags: [job-outlook, drivers]
    related_terms: [job outlook, health informatics]
    source_key: HRSA-Workforce

  - id: q009
    type: multiple_choice
    stem: "Which pathway is the clearest example of a stackable credential ladder in healthcare?"
    options:
      - "High school diploma → retail job → real estate license"
      - "CNA → LVN/LPN → RN (via ADN) → BSN → MSN or DNP (nurse practitioner)"
      - "MD → PhD → JD"
      - "Phlebotomy certificate → plumbing certificate"
    correct: 1
    rationale: "The CNA-to-NP nursing ladder is the canonical stackable-credential pattern: each credential counts toward the next, so a worker can earn wages while adding rungs."
    objective_tag: map-realistic-pathway
    difficulty: 1
    tags: [stackable, nursing]
    related_terms: [stackable credential, certificate, associate degree, bachelor's degree, graduate degree]
    source_key: NCSBN-Pathways

  - id: q010
    type: fill_blank
    stem: "The process of matching your own interests, strengths, and constraints to candidate career pathways is called ______."
    correct: "self-alignment"
    rationale: "Self-alignment turns 'healthcare is growing' into a specific plan a student can actually finish, by filtering candidate pathways through interests, strengths, and constraints."
    objective_tag: map-realistic-pathway
    difficulty: 1
    tags: [vocabulary, planning]
    related_terms: [self-alignment]
    source_key: OnetOnline

  - id: q011
    type: multiple_choice
    stem: "A student likes computer science and is squeamish about clinical settings but wants to work in healthcare. Which family fits best?"
    options:
      - "Therapeutic services"
      - "Nursing"
      - "Health informatics"
      - "Surgical technology"
    correct: 2
    rationale: "Health informatics roles — medical coding, health information management, informatics analytics — center on data work with minimal clinical patient contact, which fits this student's interests and constraints."
    objective_tag: map-realistic-pathway
    difficulty: 2
    tags: [families, self-alignment]
    related_terms: [health informatics, career family, self-alignment]
    misconception_addressed: "Misconception 2"
    source_key: BLS-OOH

  - id: q012
    type: short_answer
    stem: "A 29-year-old environmental services worker with two young children wants to move into a clinical role but cannot stop working. In two or three sentences, sketch a realistic stackable pathway and name the first next rung."
    correct: "A realistic starting rung is a CNA certificate (often completable on nights or weekends in months) while he keeps his hospital job. The next rung is an LPN/LVN program (about 12-18 months on an evening schedule), which raises pay and keeps him earning. Later rungs — ADN for RN licensure, then an online RN-to-BSN bridge — are stackable credential moves he can make rung by rung rather than committing to the whole ladder up front."
    rationale: "A strong answer starts from the worker's current rung (support services), names a certificate-level first next step (CNA or medical assistant), and frames the climb as rung-by-rung rather than all-at-once."
    objective_tag: map-realistic-pathway
    difficulty: 3
    tags: [synthesis, stackable]
    related_terms: [stackable credential, certificate, associate degree, support services]
    misconception_addressed: "Misconception 4"
    source_key: NCSBN-Pathways

  - id: q013
    type: multiple_choice
    stem: "Which statement about picking a healthcare career is most accurate?"
    options:
      - "You must pick your final job title now and never change it"
      - "A realistic plan names a starting credential and one next rung, and expects to revise after you see the work"
      - "Only medical school counts as a real healthcare plan"
      - "Career plans in healthcare are locked in by state law once you start"
    correct: 1
    rationale: "Healthcare is unusually forgiving of revised plans because of stackable credentials. A realistic plan commits to the starting rung and a next rung, not to a final job title ten years away."
    objective_tag: map-realistic-pathway
    difficulty: 2
    tags: [planning, flexibility]
    related_terms: [stackable credential, self-alignment]
    misconception_addressed: "Misconception 4"
    source_key: NCSBN-Pathways
