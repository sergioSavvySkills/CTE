# Every item traces to one of the LO's three parts:
#   1. Identify common equipment across the five health science systems
#   2. Recognize signs of malfunction
#   3. Describe the process for reporting equipment problems
# Items that drifted into imaging physics, analyzer chemistry, biomed
# troubleshooting, FDA 510(k)/PMA approval mechanics, or device
# cybersecurity were dropped as out-of-scope. Every misconception in
# misconceptions.md is addressed by at least one item below (see
# misconception_addressed fields).

items:
  - id: q001
    type: matching
    stem: "Match each piece of equipment (left) to the health science system it belongs to (right)."
    left:
      - "MRI scanner"
      - "IV pump"
      - "Barcode medication scanner"
      - "Steam autoclave (sterilizer)"
      - "PCR thermocycler"
    right:
      - "Therapeutic equipment"
      - "Support-services equipment"
      - "Diagnostic equipment"
      - "Biotech research and development equipment"
      - "Health informatics equipment"
    correct: [[0, 2], [1, 0], [2, 4], [3, 1], [4, 3]]
    rationale: "Diagnostic = MRI; therapeutic = IV pump; informatics = barcode scanner; support services = sterilizer; biotech R&D = PCR thermocycler. Learning the five categories is the scaffold students use to place any new device."
    objective_tag: identify-equipment-by-system
    difficulty: 1
    tags: [vocabulary, system-identification]
    related_terms: [critical device]
    source_key: AAMI-DeviceSafety

  - id: q002
    type: multiple_choice
    stem: "Which of the following is classified as therapeutic equipment rather than diagnostic equipment?"
    options:
      - "Spirometer"
      - "12-lead EKG"
      - "Ventilator"
      - "Ultrasound machine"
    correct: 2
    rationale: "A ventilator acts on the patient (delivers breaths), making it therapeutic. EKG, spirometer, and ultrasound all produce information about the patient, making them diagnostic."
    objective_tag: identify-equipment-by-system
    difficulty: 1
    tags: [system-identification]

  - id: q003
    type: multiple_choice
    stem: "An IV pump alarms with 'occlusion — downstream.' A nurse silences the alarm and the beeping stops. Is the infusion safe to continue unchanged?"
    options:
      - "Yes — silencing the alarm clears the fault"
      - "Yes — if no new alarm sounds within one minute"
      - "No — silencing only suppresses the sound; the underlying cause may still be present and the message should be read"
      - "No — but only because all IV-pump alarms indicate device failure"
    correct: 2
    rationale: "An alarm is the device asking for attention, not an announcement that the problem is resolved. Silencing suppresses the sound without addressing the cause. Read the message, trace the line or switch to a backup pump, and file a work order if the device is the problem."
    objective_tag: recognize-malfunction
    difficulty: 2
    tags: [malfunction, misconception, alarms]
    related_terms: [alarm, malfunction]
    misconception_addressed: "Misconception 1"
    source_key: ECRI-AlertsList

  - id: q004
    type: true_false
    stem: "A glucose meter with a cracked case that still powers on and reads a test strip is safe to use for the rest of the shift before sending it in."
    correct: false
    rationale: "Visible physical damage is itself a take-it-out-of-service signal, regardless of whether the device appears to function. A cracked housing can mean electrical leakage, a fluid seal breach, or a component that is no longer calibrated. Tag the device 'Do Not Use' and file a work order."
    objective_tag: recognize-malfunction
    difficulty: 1
    tags: [malfunction, misconception]
    related_terms: [malfunction, lockout tag]
    misconception_addressed: "Misconception 2"
    source_key: AAMI-DeviceSafety

  - id: q005
    type: multiple_choice
    stem: "What does a 'Do Not Use' lockout tag on a medical device tell a clinician?"
    options:
      - "The device is scheduled for preventive maintenance next month"
      - "The device is unsafe and must not be operated until cleared"
      - "The device is reserved for a specific patient"
      - "The device is being cleaned and will be available soon"
    correct: 1
    rationale: "A lockout tag is a physical label — based on the OSHA lockout/tagout principle — that warns staff the device is unsafe and must not be operated. Once tagged, the device stays out of service until biomed clears it."
    objective_tag: report-equipment-problem
    difficulty: 1
    tags: [reporting, vocabulary]
    related_terms: [lockout tag]
    source_key: OSHA-LOTO

  - id: q006
    type: multiple_choice
    stem: "Which department is the formal work order for equipment repair sent to?"
    options:
      - "Risk management"
      - "The FDA"
      - "Biomed (clinical engineering / healthcare technology management)"
      - "The patient's primary clinician"
    correct: 2
    rationale: "A work order goes to biomed — the facility's clinical-engineering or healthcare-technology-management team — who inspect, repair, and either clear or retire the device. Risk management handles incident reports; the FDA receives MDRs that the facility files."
    objective_tag: report-equipment-problem
    difficulty: 1
    tags: [reporting, vocabulary]
    related_terms: [work order, biomed]
    source_key: TJC-EC

  - id: q007
    type: ordering
    stem: "A respiratory therapist finds a hairline crack on a ventilator circuit that is in active use on a stable patient. Place the actions in the correct order."
    options:
      - "Submit a work order to biomed describing the defect"
      - "Attach a lockout tag to the damaged circuit and remove it from service"
      - "Switch the patient to a fresh ventilator circuit or backup ventilator"
      - "File an incident report to risk management for the near-miss"
    correct: [2, 1, 0, 3]
    rationale: "Protect the patient first (switch to a safe circuit), then remove the damaged equipment from service with a lockout tag, then file the work order so biomed can act, and finally document the near-miss through risk management."
    objective_tag: report-equipment-problem
    difficulty: 2
    tags: [reporting, procedure]
    related_terms: [lockout tag, work order, incident report, risk management]
    source_key: TJC-EC

  - id: q008
    type: multiple_choice
    stem: "Who files a Medical Device Report (MDR) with the FDA after a hospital device is suspected to have contributed to a patient's serious injury?"
    options:
      - "The bedside clinician, directly to the FDA"
      - "The facility — typically risk management and the regulatory team — based on the internal incident report"
      - "The patient"
      - "Biomed, after they finish the device repair"
    correct: 1
    rationale: "MDRs are filed at the facility level, usually by risk management or a regulatory affairs team, based on the internal incident report. The bedside clinician's job is to write the incident report and preserve the device; the facility handles the FDA submission."
    objective_tag: report-equipment-problem
    difficulty: 2
    tags: [reporting, misconception, MDR]
    related_terms: [MDR, medical device reporting, risk management, incident report]
    misconception_addressed: "Misconception 3"
    source_key: FDA-MDR

  - id: q009
    type: true_false
    stem: "Telling your supervisor about a broken device is, by itself, the full report — no other paperwork is needed."
    correct: false
    rationale: "Equipment reporting is layered. A work order goes to biomed so the device is inspected; an incident report goes to risk management if a patient was harmed or could have been; an MDR is filed with the FDA for device-related serious injury or death. Telling your supervisor starts the process; it does not end it."
    objective_tag: report-equipment-problem
    difficulty: 2
    tags: [reporting, misconception]
    related_terms: [work order, incident report, MDR]
    misconception_addressed: "Misconception 3"
    source_key: TJC-EC

  - id: q010
    type: short_answer
    stem: "In one or two sentences, explain what medical device reporting (MDR) is and how the FDA uses the reports it receives."
    correct: "Medical device reporting (MDR) is the FDA program under which manufacturers, importers, and hospital user facilities report device-related patient deaths, serious injuries, and certain malfunctions. The FDA aggregates MDRs across facilities to detect safety patterns and, when warranted, works with manufacturers to issue device recalls."
    rationale: "Checks the student can define MDR and name the post-market surveillance function — patterns across facilities drive recalls."
    objective_tag: report-equipment-problem
    difficulty: 2
    tags: [reporting, misconception, MDR]
    related_terms: [MDR, medical device reporting]
    misconception_addressed: "Misconception 4"
    source_key: FDA-MDR

  - id: q011
    type: multiple_choice
    stem: "A sterilizer's biological indicator test grows back positive, meaning the last cycle did not sterilize the load. The printed cycle parameters look normal and no error code is showing. What is the correct first action?"
    options:
      - "Re-run the same load through the same sterilizer to reconfirm the result"
      - "Trust the printed cycle parameters and release the instruments"
      - "Quarantine the affected load as 'Do Not Use,' take the sterilizer out of service, and file a work order and incident report"
      - "Wait for the next scheduled biological indicator test before taking action"
    correct: 2
    rationale: "A failed biological indicator means the cycle did not sterilize, regardless of what the printout says. The trays are not safe to use; the sterilizer is out of service until biomed re-validates; risk management reviews the near-miss."
    objective_tag: report-equipment-problem
    difficulty: 2
    tags: [reporting, sterilization]
    related_terms: [lockout tag, work order, incident report]
    source_key: CDC-SterilizationGuidelines

  - id: q012
    type: multiple_choice
    stem: "A unit's barcode medication scanners go offline during a shift. Which of the following is the correct response?"
    options:
      - "Stop administering medications entirely until the scanners come back"
      - "Skip medication verification for the duration of the outage"
      - "Follow the unit's downtime procedure — paper-based or two-nurse verification — until service returns"
      - "Continue as normal; barcode verification is optional"
    correct: 2
    rationale: "Every unit maintains a downtime procedure for foreseeable informatics-equipment outages. The procedure — often paper orders and two-nurse verification — preserves medication safety until scanners are back online."
    objective_tag: recognize-malfunction
    difficulty: 2
    tags: [malfunction, informatics, downtime]
    related_terms: [downtime procedure]
    source_key: TJC-EC

  - id: q013
    type: multiple_choice
    stem: "Which of the following best describes preventive maintenance on healthcare equipment?"
    options:
      - "Repairs made only after a device has failed"
      - "Scheduled inspection, cleaning, and testing on a regular cycle to catch problems before the device fails in use"
      - "Staff training on how to operate new equipment"
      - "The manufacturer's warranty coverage"
    correct: 1
    rationale: "Preventive maintenance is scheduled, proactive work — battery checks, calibration, cleaning, self-tests — that catches problems before they show up at the bedside. It is why most critical devices work on demand, and the backbone Joint Commission Environment of Care expects."
    objective_tag: report-equipment-problem
    difficulty: 1
    tags: [vocabulary, maintenance]
    related_terms: [preventive maintenance, critical device]
    source_key: TJC-EC
