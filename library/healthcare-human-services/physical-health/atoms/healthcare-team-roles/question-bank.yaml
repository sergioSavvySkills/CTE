items:
  - id: q001
    type: multiple_choice
    stem: "Which of the following best defines a healthcare worker's 'scope of practice'?"
    options:
      - "The set of tasks the worker personally feels confident doing"
      - "The set of tasks the worker is legally and professionally permitted to perform based on their license, certification, and training"
      - "The list of patients the worker is assigned on a given shift"
      - "The hospital department where the worker is employed"
    correct: 1
    rationale: "Scope of practice is defined by licensure, certification, and training — not by personal comfort, caseload, or department. Each role's scope is what determines what they can and cannot legally do."
    objective_tag: identify-scope
    difficulty: 1
    tags: [vocabulary, scope]
    related_terms: [scope of practice, licensed, certified]
    source_key: NCSBN-Delegation

  - id: q002
    type: matching
    stem: "Match each task (left) to the team member whose scope best fits it (right)."
    left:
      - "Push IV morphine on a medical floor"
      - "Take vital signs on a stable patient"
      - "Verify a new prescription for drug interactions"
      - "Evaluate gait and plan a mobility program"
      - "Diagnose pneumonia and order antibiotics"
    right:
      - "Physical therapist"
      - "Registered nurse"
      - "Hospitalist physician"
      - "Certified nursing assistant"
      - "Pharmacist"
    correct: [[0, 1], [1, 3], [2, 4], [3, 0], [4, 2]]
    rationale: "IV medication administration requires RN scope; vital signs are a classic CNA-delegable task; drug-interaction checking is the pharmacist's independent responsibility; gait evaluation and mobility planning are PT scope; diagnosing and prescribing are physician scope."
    objective_tag: identify-scope
    difficulty: 2
    tags: [matching, scope]
    related_terms: [RN, scope of practice, delegation, allied health]
    source_key: BLS-OOH

  - id: q003
    type: multiple_choice
    stem: "An RN has four patients and one CNA on shift. Which of these tasks is MOST appropriate for the RN to delegate to the CNA?"
    options:
      - "The initial nursing assessment on a new admission"
      - "Administering a scheduled IV antibiotic"
      - "Turning a patient and observing whether a dressing is clean, dry, and intact"
      - "Deciding whether to call the physician about a falling blood pressure"
    correct: 2
    rationale: "Turning and observing a dressing sits comfortably in a CNA's scope. Nursing assessment, IV medication administration, and clinical escalation decisions all require RN judgment and cannot be delegated to a CNA."
    objective_tag: apply-delegation
    difficulty: 2
    tags: [delegation, nursing]
    related_terms: [delegation, RN, scope of practice]
    source_key: NCSBN-Delegation

  - id: q004
    type: true_false
    stem: "A certified nursing assistant (CNA) and a licensed practical nurse (LPN) have the same scope of practice."
    correct: false
    rationale: "A CNA is certified and cannot administer medications or perform nursing assessments. An LPN holds a license and administers many medications, reinforces teaching, and performs basic assessments within state rules. The scopes are different."
    objective_tag: identify-scope
    difficulty: 1
    tags: [nursing-ladder, scope]
    related_terms: [certified, licensed, RN]
    misconception_addressed: "Misconception 2"
    source_key: NCSBN-Delegation

  - id: q005
    type: multiple_choice
    stem: "Which statement about an advanced practice provider (PA or NP) is most accurate?"
    options:
      - "They are licensed nurses who do not diagnose or prescribe"
      - "They diagnose, prescribe, and manage care, often working alongside or in place of a physician"
      - "They are unlicensed assistants to the physician"
      - "They only work in hospital operating rooms"
    correct: 1
    rationale: "An advanced practice provider — typically a nurse practitioner or physician assistant — is trained to diagnose, prescribe, and manage care. In many primary-care clinics APPs see routine patients independently, consulting the physician on complex cases."
    objective_tag: identify-roles
    difficulty: 1
    tags: [vocabulary, app]
    related_terms: [advanced practice provider, PA, MD, supervision]
    source_key: BLS-OOH

  - id: q006
    type: ordering
    stem: "Order the following nursing ladder rungs from narrowest scope to broadest scope."
    options:
      - "Certified nursing assistant (CNA)"
      - "Licensed practical/vocational nurse (LPN/LVN)"
      - "Registered nurse (RN)"
      - "Nurse practitioner (NP)"
    correct: [0, 1, 2, 3]
    rationale: "CNAs have the narrowest scope (no medications, no assessments). LPNs add medication administration and basic assessments. RNs add full assessments, all routes of medications, and delegation authority. NPs add diagnosis, prescribing, and independent or collaborative care management."
    objective_tag: identify-scope
    difficulty: 2
    tags: [nursing-ladder, scope]
    related_terms: [RN, advanced practice provider, certified, licensed]
    source_key: NCSBN-Delegation

  - id: q007
    type: fill_blank
    stem: "The standardized handoff format used to communicate a patient's status between team members — Situation, Background, Assessment, Recommendation — is called ______."
    correct: "SBAR"
    rationale: "SBAR is the four-segment structured handoff format endorsed by AHRQ TeamSTEPPS. The Assessment and Recommendation segments are the pieces unstructured handoffs most often drop."
    objective_tag: explain-team-benefits
    difficulty: 1
    tags: [vocabulary, handoff]
    related_terms: [SBAR, handoff]
    source_key: AHRQ-TeamSTEPPS

  - id: q008
    type: multiple_choice
    stem: "Which of the following BEST explains why team-based care produces safer outcomes than a brilliant individual clinician working alone?"
    options:
      - "Teams are cheaper than individuals"
      - "Complementary expertise, cross-checks, and structured handoffs catch errors an individual could miss"
      - "Teams are required by federal law for all patient care"
      - "Individuals are slower than teams"
    correct: 1
    rationale: "The evidence base for team-based care is that complementary expertise, independent cross-checks at each role boundary, and structured handoffs reduce adverse events and missed diagnoses relative to solo practice."
    objective_tag: explain-team-benefits
    difficulty: 2
    tags: [team-rationale, safety]
    related_terms: [interprofessional team, handoff, SBAR]
    source_key: IOM-QualityChasm

  - id: q009
    type: true_false
    stem: "Because environmental services, transport, and dietary staff are non-clinical, mistakes in those roles do not affect patient outcomes."
    correct: false
    rationale: "Non-clinical support roles directly affect outcomes. A delayed bed turn worsens ED holds; wrong-diet trays cause clinical harm; a coded allergy error can cascade into a drug event. Team-based safety treats clinical and non-clinical roles as jointly producing the outcome."
    objective_tag: identify-roles
    difficulty: 2
    tags: [support-roles, safety]
    related_terms: [interprofessional team]
    misconception_addressed: "Misconception 3"
    source_key: AHRQ-TeamSTEPPS

  - id: q010
    type: multiple_choice
    stem: "A physician writes a medication order. Which of the following best describes the team cross-check for that order before it reaches the patient?"
    options:
      - "Only the physician checks the order"
      - "The pharmacist verifies interactions and dosing; the nurse verifies the patient and clinical fit at administration"
      - "The unit clerk verifies the order"
      - "The patient checks their own order"
    correct: 1
    rationale: "Medication orders pass through at least three independent gates — the ordering clinician, the verifying pharmacist, and the administering nurse — each using their own scope to catch a different kind of error."
    objective_tag: explain-team-benefits
    difficulty: 2
    tags: [cross-checks, medications]
    related_terms: [interprofessional team, scope of practice]
    misconception_addressed: "Misconception 1"
    source_key: IOM-QualityChasm

  - id: q011
    type: multiple_choice
    stem: "Which of the following is an 'allied health' role?"
    options:
      - "Registered nurse"
      - "Hospitalist physician"
      - "Respiratory therapist"
      - "Nurse practitioner"
    correct: 2
    rationale: "Allied health refers to clinical professions outside nursing, medicine, and dentistry — respiratory therapists, imaging technologists, lab scientists, pharmacists, PT/OT/SLP, and similar. Nurses, physicians, and nurse practitioners are not allied health."
    objective_tag: identify-roles
    difficulty: 1
    tags: [vocabulary, allied-health]
    related_terms: [allied health, RN, MD]
    source_key: BLS-OOH

  - id: q012
    type: short_answer
    stem: "In 2-3 sentences, explain what distinguishes 'licensed' from 'certified' for healthcare team members, and give one example of each."
    correct: "A licensed professional is authorized by a state board to practice after meeting education, examination, and sometimes experience requirements; an RN or MD is licensed. A certified worker has met a training or testing standard recognized by a professional body or state registry, but the authority is usually narrower than full licensure; a CNA or medical assistant is certified. Scope differences follow from this distinction — licensed clinicians can do many things certified workers cannot."
    rationale: "A strong answer names state board licensure as the bright line for broad clinical authority, names certification as the narrower recognition for supporting roles, and gives one clear example on each side."
    objective_tag: identify-scope
    difficulty: 2
    tags: [vocabulary, scope]
    related_terms: [licensed, certified, RN, MD]
    source_key: NCSBN-Delegation

  - id: q013
    type: short_answer
    stem: "You are ending your shift and need to hand off a patient admitted with chest pain, now stable after nitroglycerin, awaiting a stress test in the morning. Give an SBAR handoff in 3-5 sentences."
    correct: "Situation — Mr. Smith, bed 4, admitted last night with chest pain, now stable. Background — 62-year-old with hypertension, pain started at rest, resolved with nitroglycerin; troponins negative so far. Assessment — likely unstable angina, ruled-out MI on current labs, pending stress test tomorrow morning. Recommendation — maintain telemetry, recheck troponin with morning labs, keep NPO after midnight for the stress test, and call the cardiologist if pain recurs."
    rationale: "A strong answer produces four recognizable SBAR segments — situation (who and current status), background (admission reason and course), assessment (what you think is going on), recommendation (what to watch and do). Dropping the assessment or recommendation is the most common handoff error and is what the structured format is meant to prevent."
    objective_tag: explain-team-benefits
    difficulty: 3
    tags: [synthesis, handoff]
    related_terms: [SBAR, handoff]
    misconception_addressed: "Misconception 4"
    source_key: AHRQ-TeamSTEPPS
