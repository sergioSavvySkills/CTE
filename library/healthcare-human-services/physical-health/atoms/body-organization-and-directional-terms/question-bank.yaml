# Every item traces to one of the LO's three parts:
#   1. Describe levels of body organization
#   2. Identify anatomical planes and cavities
#   3. Use directional terms to locate structures
# Or to a misconception explicitly addressed in misconceptions.md.
#
# Items dropped for scope from earlier draft: heart-chamber naming,
# CT vs. MRI physics, embryology of the ventral cavity, appendicitis
# symptom progression. Those belong in later deep-dive atoms.

items:
  - id: q001
    type: multiple_choice
    stem: "Which of the following lists the levels of organization in order from smallest to largest?"
    options:
      - "Organ → tissue → cell → organ system → organism"
      - "Chemical → cellular → tissue → organ → organ system → organism"
      - "Cellular → chemical → tissue → organ system → organ → organism"
      - "Tissue → cell → organ → chemical → organism → organ system"
    correct: 1
    rationale: "The hierarchy starts at the chemical level (atoms and molecules) and builds up through cells, tissues, organs, organ systems, and finally the organism."
    objective_tag: describe-levels-of-organization
    difficulty: 1
    tags: [levels-of-organization]
    related_terms: [levels of organization]
    source_key: Tortora §1.4

  - id: q002
    type: true_false
    stem: "In anatomical position, the palms are turned forward and the arms rest at the sides."
    correct: true
    rationale: "Anatomical position is defined as standing upright, facing forward, arms at sides, with palms turned forward. The palms-forward detail fixes the forearm so anatomical terms stay consistent."
    objective_tag: define-anatomical-position
    difficulty: 1
    tags: [anatomical-position]
    related_terms: [anatomical position]
    source_key: OpenStax §1.6

  - id: q003
    type: multiple_choice
    stem: "A CT image shows a horizontal slice of the abdomen as if the body had been cut like a loaf of bread. Which plane does this image show?"
    options:
      - "Sagittal"
      - "Midsagittal"
      - "Frontal (coronal)"
      - "Transverse"
    correct: 3
    rationale: "A transverse plane cuts the body horizontally into superior and inferior portions. CT images are typically transverse slices."
    objective_tag: identify-plane
    difficulty: 1
    tags: [planes]
    related_terms: [transverse plane]
    source_key: OpenStax §1.7

  - id: q004
    type: multiple_choice
    stem: "A radiology report describes a 'parasagittal view, 3 cm right of midline.' Which plane is this, and how does it differ from a midsagittal view?"
    options:
      - "It is a frontal plane; it differs because it separates anterior from posterior"
      - "It is a sagittal plane that does NOT pass through the midline, unlike a midsagittal plane which does"
      - "It is identical to a midsagittal view; 'parasagittal' is just a synonym"
      - "It is a transverse plane offset from center"
    correct: 1
    rationale: "Sagittal is the family of vertical planes that split left from right. Midsagittal is the specific sagittal plane through the midline. Any sagittal plane offset from the midline is still sagittal but not midsagittal."
    objective_tag: distinguish-sagittal-midsagittal
    difficulty: 2
    tags: [planes, misconception]
    related_terms: [sagittal plane, midsagittal plane]
    misconception_addressed: "Misconception 2"
    source_key: Tortora §1.4

  - id: q005
    type: matching
    stem: "Match each directional term (left) to its meaning (right)."
    left:
      - "Superior"
      - "Medial"
      - "Proximal"
      - "Superficial"
    right:
      - "Closer to the surface of the body"
      - "Toward the midline of the body"
      - "Toward the head"
      - "Closer to the point of limb attachment"
    correct: [[0, 2], [1, 1], [2, 3], [3, 0]]
    rationale: "Superior = toward the head; medial = toward the midline; proximal = closer to limb attachment; superficial = closer to the surface. Each is half of a directional pair."
    objective_tag: use-directional-terms
    difficulty: 1
    tags: [directional-terms]
    related_terms: [superior, medial, proximal, superficial]
    source_key: OpenStax §1.6

  - id: q006
    type: multiple_choice
    stem: "A stroke on the right side of a patient's brain causes weakness on the left side of the body. The left side is described as ______ to the side of the brain injury."
    options:
      - "Ipsilateral"
      - "Contralateral"
      - "Superior"
      - "Distal"
    correct: 1
    rationale: "Contralateral means 'on the opposite side of the body.' Ipsilateral would mean the same side."
    objective_tag: use-directional-terms
    difficulty: 2
    tags: [directional-terms]
    related_terms: [contralateral]
    source_key: OpenStax §1.6

  - id: q007
    type: fill_blank
    stem: "The body cavity that contains the brain and spinal cord is the ______ cavity."
    correct: "dorsal"
    rationale: "The dorsal cavity is the posterior body cavity and contains the cranial cavity (brain) and spinal cavity (spinal cord)."
    objective_tag: identify-cavity
    difficulty: 1
    tags: [cavities]
    related_terms: [dorsal cavity]
    source_key: Tortora §1.4

  - id: q008
    type: multiple_choice
    stem: "The ventral cavity is divided by the diaphragm into which two subdivisions?"
    options:
      - "Cranial cavity and spinal cavity"
      - "Thoracic cavity and abdominopelvic cavity"
      - "Pleural cavity and pericardial cavity"
      - "Dorsal cavity and abdominopelvic cavity"
    correct: 1
    rationale: "The diaphragm separates the thoracic cavity (above, containing heart and lungs) from the abdominopelvic cavity (below, containing digestive, urinary, and reproductive organs)."
    objective_tag: identify-cavity
    difficulty: 1
    tags: [cavities]
    related_terms: [ventral cavity]
    source_key: Tortora §1.4

  - id: q009
    type: short_answer
    stem: "A patient faces you. You see a bruise on the side of their chest that appears to be on the right from your perspective. On which side should you chart the bruise, and why?"
    correct: "The patient's left side. Anatomical 'left' and 'right' always refer to the patient's own left and right, not the observer's. When the clinician faces the patient, the patient's left is on the observer's right."
    rationale: "Anatomical laterality is patient-referenced, not observer-referenced. Getting this wrong can produce a chart that directs treatment to the wrong side."
    objective_tag: use-directional-terms
    difficulty: 2
    tags: [laterality, misconception]
    related_terms: [contralateral]
    misconception_addressed: "Misconception 1"
    source_key: OpenStax §1.6

  - id: q010
    type: true_false
    stem: "If a patient is lying face-down on a gurney, the sternum is now posterior to the spine, because anatomical directions follow the patient's current posture."
    correct: false
    rationale: "All directional terms are defined against anatomical position (standing, palms forward), not the patient's current posture. The sternum is anterior to the spine whether the patient is standing, lying on their back, or lying face-down."
    objective_tag: use-directional-terms
    difficulty: 2
    tags: [directional-terms, misconception]
    related_terms: [anterior, anatomical position]
    misconception_addressed: "Misconception 3"
    source_key: OpenStax §1.6

  - id: q011
    type: multiple_choice
    stem: "A patient reports sharp pain in the right lower quadrant. Which TWO of the following organs commonly live in the RLQ and would be reasonable to suspect?"
    options:
      - "Liver and gallbladder"
      - "Appendix and cecum"
      - "Spleen and stomach"
      - "Left kidney and sigmoid colon"
    correct: 1
    rationale: "The RLQ contains the appendix, cecum, parts of the small intestine, and (in female anatomy) the right ovary and Fallopian tube. The liver and gallbladder are primarily RUQ; spleen and stomach are LUQ."
    objective_tag: identify-quadrant-organs
    difficulty: 2
    tags: [quadrants, clinical]
    related_terms: [abdominopelvic quadrants]
    source_key: Mayo-Abdominal

  - id: q012
    type: short_answer
    stem: "What two lines divide the abdomen into the four abdominopelvic quadrants, and where do they cross?"
    correct: "A midsagittal (vertical) line and a transverse (horizontal) line, crossing at the umbilicus (navel)."
    rationale: "The quadrants are defined geometrically by these two lines, not by which organs happen to sit in each region. This is why the boundaries are consistent from patient to patient."
    objective_tag: identify-quadrant-boundaries
    difficulty: 2
    tags: [quadrants, misconception]
    related_terms: [abdominopelvic quadrants, midsagittal plane, transverse plane]
    misconception_addressed: "Misconception 4"
    source_key: Marieb Ch. 1

  - id: q013
    type: ordering
    stem: "Arrange these structures in order from smallest (chemical level) to largest (organism level) in the hierarchy of body organization."
    options:
      - "Heart (organ)"
      - "Water molecule (chemical)"
      - "Cardiovascular system (organ system)"
      - "Cardiac muscle tissue (tissue)"
      - "Person (organism)"
      - "Cardiac muscle cell (cellular)"
    correct: [1, 5, 3, 0, 2, 4]
    rationale: "Chemical (water molecule) → cellular (cardiac muscle cell) → tissue (cardiac muscle tissue) → organ (heart) → organ system (cardiovascular) → organism (person)."
    objective_tag: describe-levels-of-organization
    difficulty: 2
    tags: [levels-of-organization]
    related_terms: [levels of organization]
    source_key: OpenStax §1.6
